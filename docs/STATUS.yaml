decisions:                         # краткие ссылки; полные ADR — в DECISIONS.md
  - decision: "Брокер — NATS JetStream (не Kafka) ради лёгкости на Compose"
    rationale: "Меньший ресурсный след на одном хосте; Kafka — замена при высоком throughput"
    date: "2026-07-06"
    alternatives: ["Kafka"]
  - decision: "Поиск — Typesense (не OpenSearch)"
    rationale: "Лёгкий, фасеты/typo/гео; OpenSearch — замена при сложных агрегатах"
    date: "2026-07-06"
    alternatives: ["OpenSearch", "PostgreSQL FTS"]
  - decision: "Telegram-авторизация по номеру через бота (request_contact)"
    rationale: "Работает без фронтенда; nonce/deep-link связывает клиентскую сессию"
    date: "2026-07-06"
    alternatives: ["Login Widget", "Mini App initData"]
  - decision: "Catalog и Location — отдельные сервисы (без объединения в reference)"
    rationale: "Следуем схеме db-per-service из ТЗ; сервисы на Go дёшевы по ресурсам"
    date: "2026-07-06"
    alternatives: ["Единый reference-сервис"]
  - decision: "Доступ к БД — pgx + чистые репозитории (без sqlc)"
    rationale: "Динамические фильтры листинга/поиска неудобны в sqlc; меньше codegen-зависимостей"
    date: "2026-07-06"
    alternatives: ["sqlc"]
  - decision: "Один PostgreSQL-инстанс (БД на сервис) + PgBouncer transaction с max_prepared_statements (ADR-013)"
    rationale: "PgBouncer >=1.21 держит prepared statements в transaction-режиме → pgx на дефолтном cache_statement без правок; мультиплексирование сохранено"
    date: "2026-07-07"
    alternatives: ["pgx simple_protocol/exec", "PgBouncer session-режим", "Инстанс на сервис"]
  - decision: "Gateway: optional-auth + проброс идентичности заголовками + fail-open rate-limit (ADR-014)"
    rationale: "Тонкий gateway без бизнес-логики: проверка входа для эндпоинта — в сервисах; rate-limiter не должен быть SPOF; заголовкам X-User-* доверяет только приватная сеть"
    date: "2026-07-07"
    alternatives: ["Строгая protected-таблица на gateway", "fail-closed rate-limit", "внутренний пере-подписанный JWT"]
  - decision: "Наблюдаемость: OTel traces→Tempo, OTel metrics→Prometheus (pull), логи→Loki через Alloy, без центрального коллектора (ADR-015)"
    rationale: "Меньше движущихся частей на одном хосте; otelhttp пишет RED автоматически; Alloy вместо EOL-Promtail; сервис получает наблюдаемость из pkg/shared из коробки"
    date: "2026-07-07"
    alternatives: ["Центральный OTel Collector", "Promtail", "ручной client_golang для метрик", "Jaeger"]
  - decision: "Атрибуты категорий: наследование вниз по материализованному path, эффективный набор считается на лету (ADR-016)"
    rationale: "Junction category_attributes без копий — единственный источник истины; изменение на разделе сразу видно потомкам; self-join по path вместо рекурсии/денормализации; кеш эффективного набора — в 2.4"
    date: "2026-07-08"
    alternatives: ["Рекурсивный CTE по parent_id", "Денормализация унаследованных атрибутов", "Разрешение в коде приложения"]

