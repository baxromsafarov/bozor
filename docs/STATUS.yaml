    evidence: "services/auth (модуль bozor/services/auth в go.work). Миграция 00001_init_auth: users (telegram_user_id UNIQUE, phone, status CHECK), refresh_tokens (token_hash bytea UNIQUE, family_id, device_id — под ротацию/reuse-detection ADR-012), auth_audit_log, outbox (DDL синхр. с pkg/shared/outbox). Миграции применяются при старте через pkg/shared/migrate по прямому DSN к postgres:5432 (не PgBouncer, ADR-013); рантайм-пул — через pgbouncer:6432. Транспорт: chi + middleware из pkg/shared (recover/request-id/lang/access-log/otel) + health/ready(postgres ping)/metrics; POST /api/v1/auth/telegram/webhook — constant-time проверка X-Telegram-Bot-Api-Secret-Token, толерантный декодер update (payload Telegram шире модели). Dockerfile: build-local go.work (go work init pkg/shared + сервис) → distroless static nonroot, healthcheck /auth -health. Тесты unit (config DSN, webhook 401/200/422, tolerant, health, 404); golangci-lint 0 issues. Живая проверка: 14/14 healthy; миграции applied=1 (4 таблицы+goose), рестарт→applied=0 (идемпотентно); webhook 401/200/422 напрямую и через gateway (routing /api/v1/auth→auth, 200 не 503); Prometheus up{job=auth}=1; логи auth в Loki (svc=auth). Также починены Dockerfile'ы gateway/auth под рост go.work"
  - stage_id: "1.2"
    title: "Phone-auth flow: request_contact — валидация владения, E.164, upsert, публикация bozor.user.created"
    completed_date: "2026-07-08"
    evidence: "Домен: NormalizePhoneUZ (E.164 +998########, из 12 цифр с 998 или 9 цифр) + NormalizeLang; sentinel ErrContactNotOwned/ErrInvalidPhone. Транспорт webhook: на /start бот шлёт кнопку request_contact (SendContactRequest, ReplyKeyboard request_contact:true), на contact — RegisterContact; локализация uz/ru; вебхук всегда 2xx для Telegram, бизнес-ошибки уходят ответом бота. КРИТИЧНО для безопасности: contact.user_id должен ==from.id (иначе ErrContactNotOwned) — пересланный чужой контакт отклоняется («отправьте свой номер»). App: RegisterContact нормализует телефон, генерирует UUIDv7, строит событие userCreated БЕЗ PII (только user_id, telegram_user_id, language_code). Repo UpsertUserWithEvent: pgxx.WithTx → INSERT ... ON CONFLICT(telegram_user_id) DO UPDATE ... RETURNING (xmax=0) AS created; событие в outbox только при created=true (идемпотентно, повторный контакт не плодит события). Тесты: unit (нормализация телефона/языка, webhook: свой контакт регистрируется/пересланный отклоняется/start шлёт кнопку) + integration на testcontainers (реальный postgres:18: первый апсерт created=true + 1 событие; повтор created=false, событий по-прежнему 1, телефон обновлён) — go test -tags=integration PASS; golangci-lint 0 issues. Живая проверка end-to-end (14/14 healthy): вебхук с валидным контактом → пользователь в users + событие в outbox → outbox.Relay (SKIP LOCKED) публикует bozor.user.created в JetStream (published_at выставляется только после успешной публикации); подтверждено: стрим BOZOR messages=2, published=t по обоим событиям. Впервые вживую проверен весь путь событий webhook→БД+outbox(одна tx)→relay→NATS"
  - stage_id: "1.3"
    title: "Nonce/deep-link: связывание клиентской сессии с Telegram-логином"
    completed_date: "2026-07-08"
    evidence: "Пакет session (Redis): Init генерирует одноразовый nonce (16 байт → 32 hex, TTL 3 мин, в пределах 2–5 по ROADMAP), SetNX status=pending; Link (на /start <nonce>) — только pending-nonce, обратная привязка auth:login:<tgid>→nonce; Confirm (после регистрации контакта) — помечает nonce confirmed+user_id (SET KeepTTL, чтобы не жил вечно), снимает привязку; Get — pending/confirmed или expired при отсутствии ключа. Одноразовость: связать/подтвердить можно только pending (повторно — ErrNotPending). Repo/App доработаны: UpsertUserWithEvent и RegisterContact возвращают фактический id пользователя (RETURNING id — существующий при конфликте) для подтверждения сессии. Транспорт: POST /api/v1/auth/session/init → 201 {nonce, deep_link t.me/<bot>?start=<nonce>, expires_in}; GET /api/v1/auth/session/{nonce} → {status[,user_id]} с валидацией формата nonce (регэксп hex32 → 422 invalid_nonce); webhook: /start <nonce> линкует сессию, contact по deep-link даёт особое сообщение «вход подтверждён». Конфиг: REDIS_ADDR/PASSWORD, TELEGRAM_BOT_USERNAME; readyz включает redis-ping. Тесты: unit (session HTTP: init/deep-link/pending/confirmed/malformed; webhook: /start линкует, contact подтверждает, обычный contact — простое подтверждение) + integration на testcontainers redis:8 (полный цикл init→link→confirm→get, single-use, expired, confirm без link) — go test -tags=integration PASS (repo 6.4s, session 9.9s); golangci-lint 0 issues (default+integration). Живая проверка (14/14 healthy): init через gateway → 201 nonce+deep-link+TTL180; poll pending; /start <nonce> (secret) → 200 (link, всё ещё pending); contact → 200 (register+confirm); poll → confirmed + реальный user_id (UUIDv7, совпал с users.id); malformed→422, неизвестный nonce→expired; Redis: nonce хранит confirmed+user_id+telegram_user_id с TTL; пользователь в БД, outbox 2/2 published, NATS BOZOR messages=2 (relay доставил)"
  - stage_id: "1.4"
    title: "JWT access + refresh: ротация, reuse-detection (отзыв семейства), привязка к устройству"
    completed_date: "2026-07-08"
    evidence: "Access-JWT через pkg/shared/authx.Signer (HS256, claims roles/sub/iss/exp/iat/jti, TTL 15 мин из JWT_ACCESS_TTL). Refresh — непрозрачный случайный токен (32 байта base64url), в БД только SHA-256 хеш (token_hash bytea), TTL 30 дней (JWT_REFRESH_TTL=720h). Domain: TokenPair, NewRefreshToken/HashRefreshToken, sentinel ErrTokenNotFound/Expired/Reuse/DeviceMismatch, DTO RefreshInsert/RotationResult. RefreshRepo.Rotate — атомарно (pgxx.WithTx, SELECT FOR UPDATE): активный не истёкший токен с совпадающим device гасится (revoked_at) и заменяется новым в том же family_id; предъявление уже погашенного токена = reuse → отзыв всего семейства + запись auth_audit_log(refresh_reuse_detected). ВАЖНО: доменный исход возвращается ПОСЛЕ коммита через переменную outcome — иначе return err из WithTx откатил бы отзыв семейства/гашение (этот баг был найден интеграционными тестами и исправлен). app.TokenService: IssueForUser (новое семейство, пустой device_id → генерируется) и Refresh (маппинг доменных ошибок → 401 без утечки). Транспорт: POST /api/v1/auth/refresh {refresh_token, device_id}; выпуск токенов встроен в завершение логина — GET /session/{nonce} при confirmed одноразово (Redis GETDEL, гонку выигрывает первый опрос) выдаёт пару и принимает опциональный device_id. Конфиг: JWT_SIGNING_KEY (общий с gateway, required), JWT_ACCESS_TTL/REFRESH_TTL (config.Duration). Тесты: unit (domain, TokenService issue/refresh/маппинг ошибок с проверкой подписи через authx.Parse; session confirmed→токены/гонка/bad-device; refresh-хендлер 200/422/401) + integration на testcontainers postgres (rotate happy-path, reuse→отзыв семейства+аудит, device-mismatch, not-found, expired) — go test -tags=integration PASS; golangci-lint 0 issues (default+integration). Живая проверка (14/14 healthy): confirmed poll → access(decoded: roles=[user],iss=auth,sub=user_id,exp/iat/jti)+refresh+Bearer+expires_in899+device_id; повторный poll→expired (single-use); gateway принимает валидный access (200, проброс), отклоняет мусорный bearer (401) — общий JWT_SIGNING_KEY работает; refresh-ротация выдаёт новую пару; повтор старого refresh→401 token_reuse_detected; после reuse новый refresh тоже отозван (семейство убито) →401; refresh_tokens: family 2/2 revoked, auth_audit_log 2×refresh_reuse_detected"
  - stage_id: "1.5"
    title: "Auth в gateway, logout, аудит, rate-limit — CHAPTER 1 завершён"
    completed_date: "2026-07-08"
    evidence: "Защищённый маршрут: GET /api/v1/auth/me — auth читает идентичность через authx.FromForwardedHeaders (X-User-Id/X-User-Roles, проставленные gateway после проверки access-JWT в 0.4); анонимный запрос → 401. Logout: POST /api/v1/auth/logout {refresh_token} → RefreshRepo.RevokeFamily отзывает всё семейство (идемпотентно), app.TokenService.Logout + аудит; 204. Аудит: domain.AuditEntry + repo.AuditRepo.Log (user_id/ip NULL при пустых, невалидный IP → NULL через net.ParseIP); best-effort из TokenService (login при выпуске, token_refreshed при ротации, logout); reuse пишется в самой tx ротации. Rate-limit: internal/ratelimit — фиксированное окно в Redis (INCR+PTTL+EXPIRE), fail-open при недоступности Redis, 429 RFC 7807 + Retry-After; middleware на POST /session/init (10/мин на IP) и /telegram/webhook (120/мин на IP), ключ по X-Forwarded-For/RemoteAddr. Тесты: unit (me auth/anon; logout 204/422; ratelimit middleware allow/deny/fail-open + ClientIPKey; TokenService logout+аудит) + integration на testcontainers (postgres: RevokeFamily+идемпотентность, AuditRepo login/NULL-ip; redis: fixed-window allow→deny→reset) — go test -tags=integration PASS (ratelimit 6.6s, repo 25.3s); golangci-lint 0 issues (default+integration). Живая проверка (14/14 healthy): /me с валидным access→200 {user_id,roles:[user]}; аноним→401; ПОДМЕНА X-User-Id на gateway срезается→401 (security); logout→204, затем refresh отозванного→401 token_reuse_detected; 13× init→9×201 затем 429 + Retry-After:42 (10/мин на общий IP-ключ; лишний +1 от логина через gateway с тем же XFF); auth_audit_log: login/logout/refresh_reuse_detected. CHAPTER 1 DoD выполнен: сквозной вход бот→JWT, refresh/ротация/logout работают, чужой контакт отклоняется"

  - stage_id: "2.4"
    title: "Catalog: публичные API атрибутов + кеширование (Redis + ETag) — CHAPTER 2 завершён"
    completed_date: "2026-07-08"
    evidence: "Кеш эффективных атрибутов (cache.AttrCache, Redis): готовое JSON-тело ответа по категории, ключ catalog:attrs:<gen>:<catID>. Инвалидация — по счётчику поколения (INCR catalog:attrs:gen): любая правка атрибута/привязки делает все прежние записи недостижимыми (истекают по TTL), сброс всего кеша одним запросом без SCAN. app.AttributeService.EffectiveJSON — cache-aside: проверка существования категории (404), Get из кеша или EffectiveAttributes→toEffectiveViews→marshal→Set; Update/Delete/Link/Unlink вызывают Invalidate (Create — нет: непривязанный атрибут не входит в эффективные наборы). Инвариант корректности: удалить можно только категорию-лист (ErrHasChildren из 2.2), поэтому чужие эффективные наборы правкой одной категории не рушатся. HTTP-кеширование публичных GET (writeCachedJSON): ETag=sha256(body) в кавычках, Cache-Control public max-age=60; If-None-Match (с поддержкой *, списка, слабого W/) → 304 без тела. Применено к GET /categories (дерево) и GET /categories/{id}/attributes. Тесты: unit (app: EffectiveJSON cache-miss→hit без повторного чтения БД, 404 без записи в кеш, Update/Delete/Link/Unlink инвалидируют; transport: ETag+Cache-Control на ответе, 304 по If-None-Match) — go test PASS; golangci-lint 0 issues (default+integration; G705/gosec на w.Write(серверный JSON, не HTML) подавлен //nolint c обоснованием). Живая проверка (стек healthy): GET атрибутов отдаёт ETag+Cache-Control, повтор с If-None-Match→304; дерево тоже отдаёт ETag; Redis: после GET ключ catalog:attrs:0:<cars>; admin link 'condition'→cars→204, catalog:attrs:gen стал 1, следующий GET пересчитал (condition в наборе), ETag изменился, появился ключ gen1 (старый gen0 недостижим, TTL); unlink вернул набор (gen 2). CHAPTER 2 DoD выполнен: дерево категорий, атрибуты с наследованием, публичные кешируемые API категорий/атрибутов, события каталога"
  - stage_id: "2.3"
    title: "Catalog: атрибуты категорий — типы, наследование по дереву, сид 12 разделов OLX.uz"
    completed_date: "2026-07-08"
    evidence: "Миграция 00002_attributes: attributes (id uuid PK, slug UNIQUE, name_uz/ru, type CHECK enum/int/decimal/bool/string, unit опц., is_required, is_filterable), attribute_options (FK ON DELETE CASCADE, UNIQUE(attribute_id, slug), для enum), category_attributes (junction PK(category_id, attribute_id) обе FK ON DELETE CASCADE, sort_order). Миграция 00003_seed_catalog (идемпотентный сид, ADR-007, стабильные UUID, ON CONFLICT DO UPDATE): 12 верхнеуровневых разделов OLX.uz (real-estate/transport/jobs/electronics/home-garden/personal/services/business/hobby/animals/kids/fashion, name_uz/ru) + 9 подкатегорий (apartments/houses/commercial, cars/moto/trucks, phones/computers/tv-audio) + 12 атрибутов с enum-вариантами (deal-type, rooms, area m², floor, total-floors, brand[5 опций], year, mileage km, fuel-type[4], transmission[2], condition[2], storage[4]) и привязки: общие атрибуты раздела на верхнем уровне, специфичные на подкатегории — демонстрируют наследование. Домен: AttributeType(Valid), Attribute (Unit *string, Options), AttributeOption, EffectiveAttribute (Inherited+SourceID); sentinel ErrAttributeNotFound/AttributeSlugConflict/OptionSlugConflict/InvalidAttributeType/EnumRequiresOptions/OptionsForbidden/LinkExists/LinkNotFound. Repo: ListAttributes/GetAttribute (attachOptions одним запросом ANY($1)), CreateAttribute/UpdateAttribute (pgxx.WithTx, варианты replace-all), DeleteAttribute (каскад), EffectiveAttributes (JOIN по материализованному path: t.path=anc.path OR t.path LIKE anc.path||'/%', ORDER BY anc.level → предки сверху, дедуп к верхнему; inherited=source!=target), LinkAttribute (23505→ErrLinkExists)/UnlinkAttribute. App.AttributeService: валидация типа и enum⇒options/иначе⇒нет, генерация UUIDv7 для attr+options, normalizeUnit (пустая→NULL), Effective проверяет существование категории, Link проверяет обе сущности. Транспорт: GET /api/v1/categories/{id}/attributes (публично, эффективные), POST/DELETE .../attributes (requireStaff link/unlink), GET /api/v1/attributes(+/{id}) публично, POST/PATCH/DELETE /api/v1/attributes (requireStaff); общий writeCatalogError → RFC 7807. Тесты: unit (domain; app: типы/enum-опции/normalizeUnit/Effective-404/Link-требует-обе/Update-валидация; transport: эффективные+inherited, роли 401/403/201, валидация, link 409) + integration на testcontainers postgres (create/get с опциями и сортировкой, update заменяет опции, EffectiveInheritance: brand унаследован от раздела+mileage свой с source/inherited, дубль-link 409, unlink+404, delete каскадит опции/привязки) — go test -tags=integration PASS (18s); golangci-lint 0 issues (default+integration). startDB интеграций теперь TRUNCATE после миграций — тесты не зависят от сид-данных 00003. Живая проверка (стек healthy, миграции applied=3, рестарт→0 идемпотентно): дерево через gateway = 12 разделов+подкатегории; эффективные атрибуты cars = brand+year(inherited от transport)+mileage+fuel-type+transmission(свои) с enum-опциями, порядок предки→свои; apartments = deal-type+area(inherited)+rooms+floor+total-floors; phones = condition(inherited)+storage; несуществующая категория→404; список атрибутов=12; аноним POST→401. Полный admin-раунд через gateway (JWT roles=[admin]→проброс X-User-Roles): create enum 'color'→201(UUIDv7), link к moto→204, effective moto показал inherited brand/year+свой color, повторный link→409, unlink→204, delete→204, затем GET→404"
