    title: "Сохранённые поиски + matcher: saved_searches, POST /saved-searches, GET /me/saved-searches, DELETE; на bozor.ad.approved matcher оценивает фильтры, дедуп+троттлинг, публикует bozor.saved_search.matched; CHAPTER 5 завершён"
    completed_date: "2026-07-09"
    evidence: "Сохранённые поиски с алертами в сервисе favorites-savedsearch (ADR-029; ARCHITECTURE §4.8). events: добавлен subject bozor.saved_search.matched (→ Notification). Миграция 00002: saved_searches (id, user_id, name, query_json jsonb [полный набор фильтров, зеркалит Search 4.3], category_id/region_id — ГРУБЫЕ ключи из query_json для селективного отбора кандидатов [индекс idx_saved_searches_match WHERE notify_enabled], notify_enabled, last_notified_at [троттлинг], created_at), saved_search_matches (PK saved_search_id+ad_id — дедуп пары, FK CASCADE), outbox (+idx unpublished). domain: SearchQuery (text/category/region/city/price_min-max/currency/attrs) + Matches(AdView) — точная оценка структурных фильтров (категория/регион/город/цена/валюта без регистра/атрибуты все совпадают) + текст приблизительно (подстрока без регистра по title/description; полнотекст — в Search); SavedSearch, AdView, ValidateName (руны utf8, непустое). listingclient: GetAd — читает /internal/ads/{id} (источник истины), проецирует в AdView с атрибутами (404→удалено). repo: CreateSavedSearch (query_json + грубые ключи category/region, NULL=любой), CountSavedSearches (лимит), ListSavedSearches (DESC), DeleteSavedSearch (владелец), Candidates (грубый отбор: notify_enabled AND (category NULL или =adCat) AND (region NULL или =adRegion)), RecordMatchWithEvent (одна tx: INSERT дедуп ON CONFLICT DO NOTHING → если пара новая: UPDATE last_notified_at при прошедшем окне троттлинга → если прошло: outbox.Enqueue + published=true; иначе подавлено). app.SavedSearchService: Create (ValidateName, лимит MaxSavedSearches=50, UUIDv7, trim), List, Delete (ErrSavedSearchNotFound). matcher (worker): консьюмер savedsearch-matcher на bozor.ad.approved (maxDeliver=3→DLQ) — GetAd из Listing (событие=триггер), Candidates по грубым ключам, точная Matches, RecordMatchWithEvent на каждое совпадение (дедуп+троттлинг в БД → идемпотентно на повторную доставку); payload SavedSearchMatched {saved_search_id, user_id, ad_id, name}. transport: POST /api/v1/saved-searches (201, notify_enabled по умолчанию true), GET /api/v1/me/saved-searches, DELETE /api/v1/saved-searches/{id} (204); 401/422 invalid_saved_search_name/409 too_many_saved_searches/404 saved_search_not_found. main: +outbox relay (публикация совпадений), +консьюмер bozor.ad.approved (matcher, listingclient), +SavedSearchHandler. config: LISTING_INTERNAL_URL, SAVED_SEARCH_NOTIFY_THROTTLE (1m по умолч.). gateway: /api/v1/me/saved-searches→favorites-savedsearch перед /me→user-profile (svcFavorites-константа; goconst); /api/v1/saved-searches уже вёл. compose: +env LISTING_INTERNAL_URL/SAVED_SEARCH_NOTIFY_THROTTLE + консьюмер bozor.ad.approved; .env(.example) += SAVED_SEARCH_NOTIFY_THROTTLE. Тесты: unit domain (Matches 20+ веток структурных/текст/nil-город, ValidateName) + app (Create валидация/лимит/trim, Delete владелец/повтор/чужой, List) + matcher (совпало/не совпало/цена-ломает, ad not found, пустой ad_id, ошибка Source→повтор) + transport (Create 201/default-notify/401/409, List, Delete 204/404) + integration на testcontainers postgres (CRUD+query_json roundtrip, Candidates грубые ключи [отсеивает другую категорию, включает NULL/region], исключает notify_disabled, RecordMatchWithEvent дедуп+outbox=1, троттлинг подавляет 2-е в окне) + gateway (me/saved-searches и saved-searches→favorites) — go test PASS (unit + integration 25.6s); golangci-lint 0 issues (default+integration; goconst svcFavorites); gofmt чисто; go work sync — все 10 модулей зелёные. Живая проверка (favorites-savedsearch пересобран, healthy; matcher на bozor.ad.approved, relay совпадений): создан matching-поиск (cat+region1+price_max1000+brand=toyota) и non-matching (price_max=100); publish bozor.ad.approved(активное объявление cat/region1/price500/brand=toyota) → matcher: GetAd из Listing, 2 кандидата (оба по категории), точная оценка → 1 совпадение (price_max=100 отсеян ценой), лог 'совпадения…notified=1 candidates=2'; saved_search_matches=1, outbox bozor.saved_search.matched published=t с payload {saved_search_id,user_id,ad_id,name}; повтор того же approved → дедуп (matches=1, events=1 — идемпотентно). Gateway: /me/saved-searches и /saved-searches→favorites-savedsearch по логам (user-profile 0 обращений); DELETE→204, повтор→404. CHAPTER 5 DoD выполнен: API профиля (5.1), избранное (5.2), алерты сохранённых поисков срабатывают на совпадениях (5.3). Прим.: категория оценивается точно (не иерархически — как в Search 4.3); текст — подстрока (полнотекст/typo в Search); фактическая рассылка (шаблоны/Telegram/rate-limit) — Notification (6.1), потребляющий bozor.saved_search.matched"
