    completed_date: "2026-07-10"
    evidence: "Новый сервис bozor/services/payments (БД bozor_payments, dev-порт 8093; ADR-038; ARCHITECTURE §4.12; ROADMAP 8.1). Миграция 00001: promotion_services (code PK, name/description uz/ru, durations_days integer[] — допустимые длительности покупки, BUMP={0} разовое поднятие, is_active, sort_order), promotion_bundles (наборы), promotion_bundle_items (состав: bundle_code FK, service_code FK, duration_days, bump_schedule_days integer[] — расписание авто-BUMP, PK(bundle,service)), pricing (id, product_type CHECK service|bundle, product_code, region_id [NULL=любой], category_id uuid [NULL=любая], duration_days, amount_uzs BIGINT≥0, UNIQUE NULLS NOT DISTINCT(product_type,product_code,region_id,category_id,duration_days) — база не дублируется; FK на регион/категорию нет, db-per-service). Миграция 00002 (идемпотентный сид ON CONFLICT DO UPDATE): 4 услуги + 3 набора с составом и расписаниями BUMP (FAST_SALE {2,4,6}, TURBO_SALE {3..27}) + базовые цены UZS (TOP 7д=30000/30д=90000, VIP 7д=50000, BUMP=5000, LOGO 30д=40000; наборы EASY_START=15000/FAST_SALE=45000/TURBO_SALE=150000) + демонстрация надбавок регион×категория (Ташкент region_id=1, Транспорт a0…002): TOP/7 база 30000→категория 40000→регион 45000→регион+категория 60000. domain: Service/Bundle/BundleItem/PriceRule; ключевое — разрешение цены по конкретности: Specificity (регион+2 важнее категории+1, сочетание +3, база 0), ResolvePrices выбирает максимум по конкретности на продукт×длительность, ServicePrice/BundlePrice (чистые функции, тестируемо без БД). repo: Services/Bundles (склейка состава в Go двумя запросами)/PriceRules (кандидаты под регион/категорию SQL-условием (region_id IS NULL OR =$1) AND (category_id IS NULL OR =$2), nil-аргумент→только базовые по измерению; region_id::bigint/category_id::text в SELECT + $1::int/$2::uuid в WHERE для чистого скана в указатели). app.Service.GetCatalog: собирает Catalog с ценами под (region,category); услуга отдаёт только длительности с ценой, набор без цены→Priced=false. transport: публичный GET /api/v1/promotions/catalog?region_id=&category_id= (region_id>0, category_id UUID — иначе 422 invalid_region_id/invalid_category_id; без параметров→базовый прайс), DTO currency/region_id/category_id/services[options]/bundles[amount_uzs nullable, items]. Периметр read-only как у Location (в 8.1 событий нет→без NATS/outbox, добавятся в 8.2/8.3): postgres+миграции+otel+metrics+health/ready[postgres]. Dockerfile distroless (бинарь /payments); compose: сервис payments-promotions (deps postgres/pgbouncer/tempo healthy, healthcheck -health, dev-порт 8093) + prometheus scrape-job; БД bozor_payments уже в postgres-init; gateway уже вёл /api/v1/promotions+/api/v1/payments→payments-promotions. go.work += ./services/payments. Побочно: chat/go.mod получил прямой require golang.org/x/time (Stage 7.4 импортировал через ratelimit, но зависимость держалась транзитивно go.work — изолированная сборка теперь корректна; отдельный fix-коммит). Тесты: unit domain (Specificity регион>категория, ResolvePrices выбор самого конкретного/порядко-независимость) + app (сборка priced услуг/наборов, пропуск длительности без цены, проброс региона/категории в стор, проброс ошибки) + transport (200 базовые цены, регион+категория проброшены, 422 на невалидные region_id[abc/0/-3]/category_id) + integration на testcontainers postgres (сид 4 услуг с длительностями/3 наборов с составом и расписанием BUMP, PriceRules только базовые при nil, разрешение TOP/7: регион+категория→60000, только регион→45000, только категория→40000) — go test PASS (unit + integration 11.5s); golangci-lint 0 issues (default+integration); gofmt чисто. Живая проверка (сервис healthy, миграции applied=2, рестарт→0 идемпотентно): GET /promotions/catalog отдал 4 услуги (TOP durations [7,30], BUMP [0]) и 3 набора с составом/расписаниями; разрешение TOP/7 по конкретности через dev :8093 — база 30000, ?category_id=транспорт 40000, ?region_id=1 45000, ?region_id=1&category_id=транспорт 60000; невалидные region_id=abc/category_id=xx→422; через gateway (nginx :8090→gateway→сервис) каталог 200 и то же разрешение 60000; БД: имена валидный UTF-8 (Топ-объявление char_length=14/octet=27), pricing 9 service+3 bundle строк (4 override); /metrics 200, Prometheus target payments-promotions=up. Прим.: кошелёк/леджер двойной записи (wallets, wallet_transactions, /me/wallet, /wallet/topup) — 8.2; провайдеры Payme/Click/Mock (PaymentProvider, идемпотентные колбэки) — 8.3; применение услуг к объявлению (ad_promotions, POST /ads/{id}/promote, saga списание→активация→компенсация, bozor.promotion.activated) — 8.4; воркер авто-поднятий (bozor.ad.bumped) — 8.5; ротация Топа (макс 5/категория) — 8.6; возвраты — 8.7; кеш каталога (Redis/ETag) и скидка набора относительно суммы услуг — на будущее"
  - stage_id: "7.4"
    title: "Chat модерация и лимиты — per-user rate-limit отправки, бан-проекция (забаненный не пишет), снятие сообщения модератором (bozor.chat.message_blocked); CHAPTER 7 завершён"
    completed_date: "2026-07-10"
    evidence: "Модерация и лимиты чата (ADR-037; ARCHITECTURE §4.9; завершение CHAPTER 7). Миграция chat 00002: messages += blocked_at (снятое сообщение — тело скрыто), banned_users (проекция банов), processed_events (inbox — Chat теперь консьюмер). Rate-limit: internal/ratelimit.UserLimiter — per-user token-bucket (golang.org/x/time/rate, деф. 1/сек burst 5, фоновая очистка неактивных до отмены ctx); app.SendMessage проверяет limiter.Allow (общий путь REST+WS) → ErrRateLimited; лимит на реплику (клиент держит одно WS к одной реплике [nginx sticky], REST глобально лимитит gateway). Бан: worker.Moderator консьюмер chat-ban на bozor.user.banned (inbox-идемпотентно) → repo.BanUser проецирует в banned_users; app.SendMessage и StartConversation проверяют IsBanned → ErrUserBanned (закрывает окно пока не истёк access-JWT забаненного, ~15мин; Auth уже отозвал refresh — ADR-033). Снятие сообщения: жалоба подаётся существующим POST /api/v1/reports (target_type=message, 6.4); Moderation domain.ValidateAction теперь допускает takedown для ad|message (не user — для пользователя бан); app.takedownEvent ветвится ad→bozor.ad.blocked / message→bozor.chat.message_blocked {message_id,reason}; Chat консьюмер chat-message-block на bozor.chat.message_blocked (inbox) → repo.BlockMessage проставляет blocked_at; чтение (ListMessages/GetMessage) скрывает тело (domain.BlockedBody '[сообщение удалено модератором]'). Внутренний GET /internal/messages/{id} (без auth, только внутр. сеть — как /internal/ads Listing) даёт модерации текст сообщения. transport: 429 rate_limited (apperr.KindRateLimited), 403 user_banned, InternalHandler. config: CHAT_RATE_PER_SEC/BURST. main: два консьюмера (natsx.Consume maxDeliver=3) + ratelimit.New(ctx). events: subject bozor.chat.message_blocked. Тесты: unit chat (app: бан-отказ Send+Start, rate-limit отказ, GetMessage found/not-found; worker: HandleBan/HandleBlock проекция+inbox-идемпотентность+пустой id→ошибка; transport: 429/403/internal 200/404; ratelimit) + moderation (domain ValidateAction takedown для message ok/user reject; app takedown message→bozor.chat.message_blocked) + integration chat (BanUser идемпотентно+IsBanned, BlockMessage скрывает тело в GetMessage и ListMessages, inbox) — go test PASS (unit + integration ~17s chat); golangci-lint 0 issues (chat+moderation); gofmt чисто. Живая проверка (chat+moderation пересобраны healthy, миграция 00002 applied=1): (1) снятие сообщения — buyer отправил сообщение (GET /internal/messages: тело видно, blocked=false), пожаловался target_type=message → staff takedown → bozor.chat.message_blocked → Chat скрыл (GET /internal: body='[сообщение удалено модератором]', blocked=true); (2) rate-limit — 9 быстрых REST-отправок → 5×201 (burst) затем 4×429; (3) бан — B2 начал диалог и написал (201), staff забанил через POST /moderation/bans (permanent) → bozor.user.banned → Chat спроецировал в banned_users (count=1), далее B2 отправка→403 user_banned (RFC 7807), старт нового диалога→403. Прим.: разбан (удаление из banned_users), Redis-backed кросс-репличный rate-limit, shadow-бан, авто-стопслова в сообщениях, ping/pong keepalive, лимит соединений на пользователя — на будущее; CHAPTER 7 (Chat) полностью завершён (7.1 REST-история + 7.2 WebSocket/backplane + 7.3 доставка/статусы + 7.4 модерация/лимиты)"
  - stage_id: "7.3"
    title: "Chat доставка и статусы — онлайн-гейтинг Telegram по присутствию (NATS request-reply), доставка в app-слое (REST+WS единообразно), отметки о прочтении (read_at) и счётчики непрочитанных"
    completed_date: "2026-07-10"
    evidence: "Доставка и статусы чата (ADR-036; ARCHITECTURE §4.9; ROADMAP 7.3). Онлайн-гейтинг Telegram: app.SendMessage проверяет присутствие получателя и публикует bozor.chat.message_sent (→Notification→Telegram) ТОЛЬКО если он оффлайн; онлайн — доставка по WS без дубля. Присутствие — NATS request-reply на chat.presence.<userID>: пока пользователь подключён, его реплика (Hub) отвечает на запрос (ws.NATSBackplane.RespondPresence, управляется Hub с refcount вместе с realtime-подпиской); ws.Presence.Online делает nc.Request → ответ=онлайн, nats.ErrNoResponders/таймаут(300ms)=оффлайн; ошибка трактуется как оффлайн (лучше лишнее уведомление). Доставка перенесена из WS-обработчика в app-слой (7.2 публиковал realtime в обработчике, из-за чего REST-отправка не доходила до онлайн-получателя): app.Service получил зависимости Presence + Realtime (ws.Delivery: DeliverMessage/NotifyRead → Hub.Publish кадров message/read); SendMessage всегда вызывает realtime-доставку (fire-and-forget, no-op если не подключён) и гейтит только Telegram-событие. repo.InsertMessage(msg, ev *events.Envelope) принимает опциональное событие (nil=онлайн, без outbox — вместо прежнего InsertMessageWithEvent). Отметки о прочтении: app.MarkRead(conv, reader) → repo.MarkRead помечает read_at у сообщений СОБЕСЕДНИКА (sender_id≠reader, read_at IS NULL), возвращает число; при n>0 уведомляет автора прочитанных realtime-кадром read (ReaderID+At). Счётчик непрочитанных: repo.ListConversations считает unread коррелированным подзапросом (сообщения собеседника без read_at) → conversationDTO.unread_count. Транспорт: POST /api/v1/conversations/{id}/read (200 {marked}); WS-обработчик диспетчеризует клиентский кадр по type: {type:read, conversation_id}→MarkRead, иначе→SendMessage; кадр read в обе стороны. main: chatSvc = app.NewService(store, listing, ws.NewPresence(nc), ws.NewDelivery(hub), log) — без цикла (delivery←hub, app←presence+delivery, handler←hub+app). Тесты: unit app (оффлайн→событие+доставка, онлайн→БЕЗ события+доставка, ошибка присутствия→оффлайн, MarkRead уведомляет автора/ничего-не-прочитано-не-уведомляет/не-участник) + ws (Hub refcount presence+rt подписок, presence responder; frame read; in-process integration real app+Delivery поверх loopback-backplane: доставка+ack отправителю, кадр read автору при MarkRead, ошибка не-участника) + transport (read 200 {marked}/403 не-участник, unread_count в списке) + integration на testcontainers (InsertMessage с ev=nil не плодит событие, unread-подсчёт для собеседника и 0 для своих, MarkRead помечает только чужие сообщения+обнуляет счётчик+идемпотентно) — go test PASS (unit + integration 16s); golangci-lint 0 issues; gofmt чисто. Живая проверка (chat пересобран healthy; временный WS-наблюдатель минтит JWT тем же ключом): (1) ОФФЛАЙН-продавец — buyer шлёт по REST → bozor.chat.message_sent в outbox 3→4 (Telegram-путь); (2) ОНЛАЙН-продавец (WS-наблюдатель подключён) — buyer шлёт по REST → outbox остался 4 (гейтинг сработал), продавец получил кадр {type:message,body,sender_id} по WS; (3) непрочитанные — GET /conversations продавца показал unread_count=4, POST /read вернул {marked:4}, повторный GET показал unread_count=0, read_at проставлен у всех 4 сообщений buyer'а (0 непрочитанных/4 прочитанных в БД); (4) read receipt по WS — buyer онлайн (наблюдатель), продавец делает POST /read ({marked:1}) → buyer получил кадр {type:read,reader_id:продавец,at,conversation_id}. После проверки временный клиент удалён. Прим.: гейтинг best-effort (гонка отключения между проверкой и доставкой допустима — сообщение всегда в истории); rate-limit отправки, жалоба на сообщение (target_type=message, ADR-033), блокировка в чате — 7.4; ping/pong keepalive и лимиты соединений — 7.4; «печатает…»-индикатор и presence-события — на будущее"
