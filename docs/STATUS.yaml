y healthy, миграция applied=1, 5 таблиц): publish bozor.user.created(uid,lang=uz) → консьюмер создал профиль (individual/uz/phone_visible=t), processed_events=1; повтор того же event_id → профиль не перезаписан (остался uz), 1 строка (идемпотентно через inbox); невалидный uid в событии → tx-ошибка+повтор (retry-путь виден в логах). HTTP :8087: GET /me(owner)→профиль, аноним→401; PATCH /me business+TechShop+city14+phone_visible=false→200 (display_name 'Азиз Магазин' — char_length=12/34 байта, валидный UTF-8), bozor.user.updated в outbox published=t (relay→NATS); business без названия→422; GET /me/notification-prefs→5 дефолтов(вкл), PUT выключил chat_message→GET показал enabled=false, невалидный канал sms→422; GET /users/{id}→публичный профиль+rating 0/0+member_since, неизвестный→404 profile_not_found; лениво: GET /me нового user без события→создан дефолт individual. Gateway :8080: GET /api/v1/users/{id}→user-profile (профиль/404 profile_not_found RFC7807); маршрутизация /me/ads→listing-ads, /me и /me/notification-prefs→user-profile подтверждена по access-логам сервисов. Прим.: consumer bozor.review.created (кеш рейтинга) отложен до CHAPTER 9 (Reviews ещё не публикует событие); таблица user_ratings_cache и read-путь готовы (рейтинг 0/0 по умолчанию)"
