    evidence: "Счётчик просмотров без write-hotspot (ADR-021). Пакет internal/views (Counter поверх redis.Cmdable): Incr (HINCRBY хэша listing:views), Buffered (HGET→int64, redis.Nil→0), Drain (Lua HGETALL+DEL одним EVAL — атомарный снимок+обнуление, инкременты после снятия попадают в новый ключ и не теряются; парс плоского массива в map), Restore (HINCRBY пачкой — best-effort откат). repo.AddViews(map[ad_id]delta): один batch-UPDATE ads … FROM (VALUES …) (несуществующие id молча отброшены, пустая карта no-op). app.Service += ViewCounter (может быть nil); Get учитывает просмотр best-effort (Incr + добавление Buffered к персистентному views_count — near-real-time), сбой Redis логируется, но не ломает чтение. worker.ViewFlusher: тикер LISTING_VIEWS_FLUSH_INTERVAL → Drain→AddViews→(при ошибке БД) Restore + повтор на следующем тике. transport: adResponse += views_count. main: redis.NewClient, viewCounter, goroutine ViewFlusher, readyz += ping redis. config/compose/.env(.example): REDIS_ADDR/REDIS_PASSWORD/LISTING_VIEWS_FLUSH_INTERVAL(30s); listing-ads depends_on redis healthy. Тесты: unit app (Get инкрементирует буфер и добавляет буферизованные к views_count; сбой счётчика best-effort — чтение не падает; nil-счётчик ок), worker (ViewFlusher flush пишет пачкой/пустой буфер no-op/ошибка БД→Restore/ошибка снятия→без записи) + integration на testcontainers redis:8 (Incr×2→Buffered=2, missing→0, Drain снимает {ad:2,ad2:1}+обнуляет, повторный Drain пусто; Restore восстанавливает+инкремент продолжает; Drain сохраняет конкурентные инкременты) + integration на testcontainers postgres (AddViews batch: 3/5 применены, несуществующий отброшен, повтор аккумулирует, nil no-op) — go test PASS (default + integration repo 19.9s/redis ~5s); golangci-lint 0 issues (default+integration); gofmt чисто; go work sync — все 7 модулей зелёные. Живая проверка (listing-ads healthy, readyz ready с redis-check, флеш-интервал 5s на время проверки): создан ad (cars), 3× GET /ads/{id} → views_count 1/2/3 из буфера, Redis HGET listing:views=3, при этом ads.views_count в БД=0 (нет write-hotspot: GET не пишет в БД); через ~6s флеш → ads.views_count=3, Redis-буфер очищен, лог 'просмотры слиты в БД ads=1'; следующий GET=4 (персистентное 3 + буфер 1 — аккумуляция через флеш корректна); интервал возвращён к 30s"
