decisions:                         # краткие ссылки; полные ADR — в DECISIONS.md
  - decision: "Брокер — NATS JetStream (не Kafka) ради лёгкости на Compose"
    rationale: "Меньший ресурсный след на одном хосте; Kafka — замена при высоком throughput"
    date: "2026-07-06"
    alternatives: ["Kafka"]
  - decision: "Поиск — Typesense (не OpenSearch)"
    rationale: "Лёгкий, фасеты/typo/гео; OpenSearch — замена при сложных агрегатах"
    date: "2026-07-06"
    alternatives: ["OpenSearch", "PostgreSQL FTS"]
  - decision: "Telegram-авторизация по номеру через бота (request_contact)"
    rationale: "Работает без фронтенда; nonce/deep-link связывает клиентскую сессию"
    date: "2026-07-06"
    alternatives: ["Login Widget", "Mini App initData"]
  - decision: "Catalog и Location — отдельные сервисы (без объединения в reference)"
    rationale: "Следуем схеме db-per-service из ТЗ; сервисы на Go дёшевы по ресурсам"
    date: "2026-07-06"
    alternatives: ["Единый reference-сервис"]
  - decision: "Доступ к БД — pgx + чистые репозитории (без sqlc)"
    rationale: "Динамические фильтры листинга/поиска неудобны в sqlc; меньше codegen-зависимостей"
    date: "2026-07-06"
    alternatives: ["sqlc"]
  - decision: "Один PostgreSQL-инстанс (БД на сервис) + PgBouncer transaction с max_prepared_statements (ADR-013)"
    rationale: "PgBouncer >=1.21 держит prepared statements в transaction-режиме → pgx на дефолтном cache_statement без правок; мультиплексирование сохранено"
    date: "2026-07-07"
    alternatives: ["pgx simple_protocol/exec", "PgBouncer session-режим", "Инстанс на сервис"]
  - decision: "Gateway: optional-auth + проброс идентичности заголовками + fail-open rate-limit (ADR-014)"
    rationale: "Тонкий gateway без бизнес-логики: проверка входа для эндпоинта — в сервисах; rate-limiter не должен быть SPOF; заголовкам X-User-* доверяет только приватная сеть"
    date: "2026-07-07"
    alternatives: ["Строгая protected-таблица на gateway", "fail-closed rate-limit", "внутренний пере-подписанный JWT"]
  - decision: "Наблюдаемость: OTel traces→Tempo, OTel metrics→Prometheus (pull), логи→Loki через Alloy, без центрального коллектора (ADR-015)"
    rationale: "Меньше движущихся частей на одном хосте; otelhttp пишет RED автоматически; Alloy вместо EOL-Promtail; сервис получает наблюдаемость из pkg/shared из коробки"
    date: "2026-07-07"
    alternatives: ["Центральный OTel Collector", "Promtail", "ручной client_golang для метрик", "Jaeger"]
  - decision: "Атрибуты категорий: наследование вниз по материализованному path, эффективный набор считается на лету (ADR-016)"
    rationale: "Junction category_attributes без копий — единственный источник истины; изменение на разделе сразу видно потомкам; self-join по path вместо рекурсии/денормализации; кеш эффективного набора — в 2.4"
    date: "2026-07-08"
    alternatives: ["Рекурсивный CTE по parent_id", "Денормализация унаследованных атрибутов", "Разрешение в коде приложения"]
  - decision: "Media: оригиналы в MinIO по object_key, метаданные в БД, тип по содержимому, ad_id без кросс-БД FK (ADR-017)"
    rationale: "Объектное хранилище масштабируется отдельно от БД; sniffing http.DetectContentType не даёт подделать тип; связь с объявлением финализируется в ad_images (3.3), db-per-service сохранён; запись+событие в одной outbox-tx, компенсация при сбое"
    date: "2026-07-09"
    alternatives: ["bytea в БД", "доверять Content-Type клиента", "FK ad_id на таблицу ads"]
  - decision: "Обработка медиа: фоновый воркер в процессе сервиса, imaging (чистый Go), снятие EXIF повторным кодированием, inbox-идемпотентность, очистка сирот по TTL (ADR-018)"
    rationale: "Один деплой (консьюмер+тикер рядом с HTTP/relay); imaging без cgo (Windows-разработка); re-encode отбрасывает EXIF/GPS; processed_events+переход только из uploaded дают exactly-once; превью публично (CDN), оригинал владельцу presigned"
    date: "2026-07-09"
    alternatives: ["Отдельный worker-деплой", "libvips/ImageMagick (cgo)", "Парсинг/зачистка EXIF-тегов", "Хранить сирот бессрочно"]
  - decision: "Межсервисный синхронный вызов Listing→Catalog — gRPC (proto+buf), генерат в pkg/shared/pb (ADR-019)"
    rationale: "ТЗ требует gRPC для sync-вызовов; строгий контракт + breaking-checks buf; трассировка через grpcx (otel); клиент за интерфейсом CatalogValidator (тесты без сети); общий модуль pb для сервера и клиента. Первый gRPC в проекте — задаёт схему для остальных"
    date: "2026-07-09"
    alternatives: ["HTTP-вызов Catalog", "Репликация атрибутов в Listing событиями", "Валидация без Catalog"]
  - decision: "Жизненный цикл объявления — доменная статусная машина, in-process консьюмер решений модерации (inbox) и тикер-воркер истечения (ADR-020)"
    rationale: "Правила переходов в одном месте (domain), условный UPDATE WHERE status=$from защищает от гонок; inbox processed_events + guard status=pending дают exactly-once на bozor.ad.approved|rejected; события источника истины (updated/sold/expired) в шину транзакционно через outbox; воркеры в процессе сервиса (как Media, ADR-018)"
    date: "2026-07-09"
    alternatives: ["Отдельный worker-деплой", "Активация без inbox (только guard)", "pg_cron для истечения"]
  - decision: "Счётчик просмотров — буфер в Redis (хэш listing:views + атомарный Lua HGETALL+DEL), пакетный флеш в БД, чтение с учётом буфера (ADR-021)"
    rationale: "Устраняет write-hotspot одиночных UPDATE популярной карточки; атомарный снимок всего буфера одним EVAL без потери инкрементов; batch-UPDATE FROM VALUES; near-real-time чтение (персистентное+буфер); best-effort к сбоям Redis (fail-open чтение) и БД (Restore+повтор)"
    date: "2026-07-09"
    alternatives: ["Ключ на объявление + GETDEL", "Прямой UPDATE на каждый просмотр", "Отдельный POST /ads/{id}/view"]
  - decision: "API объявлений — частичный PATCH с повторной модерацией ключевых полей, hard-delete с bozor.ad.deleted, лента из БД до Search (ADR-022)"
    rationale: "PATCH-указатели минимизируют полезную нагрузку; правка ключевых полей активного шлёт на повторную модерацию (ARCHITECTURE §4.5); ре-валидация атрибутов против Catalog; hard-delete + событие (Search снимает индекс); простая DB-лента активных закрывает DoD CHAPTER 3, богатый поиск — в CHAPTER 4"
    date: "2026-07-09"
    alternatives: ["Полная замена PUT", "Soft-delete", "Лента только через Search с самого начала"]
  - decision: "Search — read-модель Typesense (CQRS-lite), тонкий собственный HTTP-клиент (net/http) без typesense-go, коллекция ads (ADR-023)"
    rationale: "Typesense REST прост/стабилен — узкий набор операций (health/collection/index/search) реализуем сами без крупной зависимости с чужой версионностью; полный контроль ошибок/таймаутов, тесты через httptest; схема ads с nested attrs для фасетов, одно поле title/description (пользовательский текст, двуязычие токенизацией)"
    date: "2026-07-09"
    alternatives: ["Официальный typesense-go", "PostgreSQL FTS"]
  - decision: "Индексатор Search — событие как триггер + чтение актуального состояния из Listing, реконсиляция Typesense, reindex через внутренний экспорт (ADR-024)"
    rationale: "Минимальные события не несут описание/атрибуты/гео; читая истину из Listing на каждое событие, индекс сводится к текущему состоянию (устойчиво к переупорядочиванию), идемпотентно по id документа (без inbox); одна ветка построения документа для live и reindex; внутренний read Listing — HTTP (без учёта просмотра), отступление от gRPC-ADR-019 зафиксировано"
    date: "2026-07-09"
    alternatives: ["Обогатить события (event-carried state)", "Индексатор с БД/inbox", "gRPC Search→Listing"]
  - decision: "API поиска — app-слой строит запрос Typesense за интерфейсом Docs, фильтры санитизируются, маршрут /api/v1/ads/search разведён от Listing более специфичным префиксом (ADR-025)"
    rationale: "Публичный контракт GET /ads/search[/facets] не зависит от движка (замена Typesense не трогает transport); значения строковых фильтров в бэктиках + имена динамических полей attrs.<slug> санитизируются [a-z0-9_-] — защита от инъекции в filter_by; ошибка движка→503 без утечки деталей; в gateway chi отдаёт приоритет статическому /api/v1/ads/search над /api/v1/ads (listing), лишний /api/v1/search удалён"
    date: "2026-07-09"
    alternatives: ["Строить запрос Typesense прямо в transport", "Отдельный поддомен/сервис-хост для поиска", "Разведение по порядку регистрации маршрутов"]
  - decision: "Топ-блок выдачи — отдельное поле top в ответе поиска, наполняется отдельным запросом is_top на первой странице; заглушка до Promotions (ADR-026)"
    rationale: "Контракт получает место под featured/TOP уже сейчас — CHAPTER 8 лишь начнёт проставлять is_top/promotion_rank (в схеме с 4.1), API не меняется; top — отдельный запрос (фильтры запроса + is_top:=true, q='*' — врезка по категории/региону, не полнотекст; sort promotion_rank:desc), только на 1-й странице (промо-врезка вверху, экономия round-trip); пока is_top=false везде → блок пуст"
    date: "2026-07-09"
    alternatives: ["Подмешивать TOP в основную выдачу ранжированием", "Отдельный эндпоинт /ads/top", "Ждать CHAPTER 8 без задела в контракте"]
  - decision: "User/Profile — отдельный сервис (БД bozor_profile): профиль создаётся по bozor.user.created (idempotent+inbox) и лениво при первом /me; настройки уведомлений «отсутствие=включено»; разведение /me/ads от /me в gateway (ADR-027)"
    rationale: "Идентичность (телефон/telegram) в Auth, расширенный профиль отдельно (db-per-service); профиль создаётся по событию, но /me создаёт дефолт лениво — устойчивость к лагу шины (обе вставки идемпотентны ON CONFLICT DO NOTHING); настройки уведомлений хранят только отклонения от дефолта (эффективный набор = дефолты ⊕ сохранённые), новые типы уведомлений включены без миграции данных; строковые фильтры/имена не применимы, зато /me/ads (Listing) разведён от /me (Profile) более специфичным префиксом в gateway (chi приоритет статического сегмента); consumer bozor.review.created отложен до Reviews (CHAPTER 9)"
    date: "2026-07-09"
    alternatives: ["Профиль внутри Auth", "Создавать профиль только по событию (404 при лаге)", "Хранить полный набор notification_prefs строками", "Разводить /me/ads в самих сервисах"]
  - decision: "Favorites — сервис favorites-savedsearch (БД bozor_favorites): избранное без проверки существования объявления, очистка по bozor.ad.deleted, /me/favorites отдаёт ad_id (без обогащения) (ADR-028)"
    rationale: "POST /favorites/{adId} не валидирует объявление против Listing/Search (децентрализация, без синхронной связности на записи) — удалённые объявления убирает consumer bozor.ad.deleted (DELETE по ad_id идемпотентен, inbox не нужен); Add идемпотентен через ON CONFLICT DO UPDATE (сохраняет исходное created_at); лента /me/favorites возвращает ad_id+created_at без обогащения данными объявления (db-per-service; batch-обогащение через Search — позже); /me/favorites разведён от /me (Profile) более специфичным префиксом в gateway; сервис общий с сохранёнными поисками (5.3) — потому имя favorites-savedsearch"
    date: "2026-07-09"
    alternatives: ["Проверять существование объявления при добавлении (gRPC/HTTP к Listing)", "Обогащать ленту в самом сервисе", "Отдельный сервис только под favorites", "Inbox для bozor.ad.deleted"]
  - decision: "Matcher сохранённых поисков — событие bozor.ad.approved как триггер + чтение объявления из Listing, грубый отбор кандидатов по category/region в БД, точная оценка в Go, дедуп+троттлинг в БД, событие bozor.saved_search.matched (ADR-029)"
    rationale: "Событие несёт только ad_id → matcher читает истину из Listing (как индексатор Search, ADR-024); грубый отбор кандидатов индексом (category_id/region_id, NULL=любой) вместо полного перебора базы поисков (ARCHITECTURE §4.8 «индексированные по грубым ключам» — реализовано БД-индексом, не in-memory); точная оценка (цена/город/атрибуты/текст-подстрока) — в приложении; дедуп пары (saved_search_id, ad_id) таблицей + last_notified_at-троттлинг одной tx → exactly-once на пару и защита от лавины; query_json зеркалит фильтры Search 4.3; фактическая рассылка — в Notification (6.1)"
    date: "2026-07-09"
    alternatives: ["Обогащать bozor.ad.approved данными объявления", "In-memory кеш поисков (оптимизация поверх БД-индекса — позже)", "Redis для дедупа вместо таблицы", "Иерархическое совпадение категории / полнотекст в matcher"]
  - decision: "Notification — сервис (БД bozor_notification): проекция получателей из bozor.user.created, notification_prefs читаются из User/Profile (fetch-current-state+кеш), доставка в Telegram с идемпотентностью по event_id, статусами, rate-limit и ретраями через natsx (ADR-030)"
    rationale: "telegram_user_id есть только в bozor.user.created → локальная проекция recipients (единственный источник chat_id); notification_prefs владеет User/Profile → чтение через внутренний эндпоинт с TTL-кешем (как matcher/индексатор читают Listing, ADR-024/029) вместо дублирующих событий; идемпотентность по event_id (UNIQUE) + статусы в notifications; шаблоны uz/ru по языку получателя; глобальный token-bucket (x/time/rate) под лимиты Bot API; ретраи с backoff и DLQ — механизмом natsx (Nak); бан минует настройки; батчинг-дайджест отложен (анти-лавина — в источнике, matcher 5.3)"
    date: "2026-07-09"
    alternatives: ["Проецировать и notification_prefs событиями из User/Profile", "Синхронный gRPC к Auth за chat_id", "Отдельная таблица inbox вместо UNIQUE(event_id)", "Батчинг-дайджест на получателя в v1", "Честить retry_after Telegram точным Nak-delay"]
  - decision: "Moderation — сервис (БД bozor_moderation): авто-модерация по bozor.ad.updated(pending) с чтением объявления из Listing, стоп-слова/запрещённые категории/дубли, pass→bozor.ad.approved, fail→ручная очередь (ADR-031)"
    rationale: "Модерация запускается по факту отправки на проверку (status=pending в событии — экономия на драфтах/активных без fetch); объявление читается целиком из Listing (title+description для стоп-слов — источник истины, как индексатор/matcher, ADR-024/029); авто-проверки: стоп-слова uz/ru подстрокой по нормализованному тексту (сид словаря + расширяемая таблица stopwords), точное членство в forbidden_categories, детекция дублей по content_hash (нормализованный title+description) среди объявлений пользователя; прошло→bozor.ad.approved через outbox (→Listing активирует, Search индексирует, matcher, Notification), не прошло→задача manual в ручную очередь (Stage 6.3); идемпотентность по event_id (inbox), одна задача на ad_id (upsert — повторная модерация правки); очередь только персоналу (requireStaff)"
