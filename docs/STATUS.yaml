dden; продавец по своему объявлению→422 self_conversation; несуществующее объявление→404 ad_not_found. Прим.: WebSocket /ws + backplane между репликами и гейтинг публикации по онлайн-статусу получателя — 7.2; в 7.1 bozor.chat.message_sent публикуется на КАЖДОЕ сообщение (нет отслеживания присутствия); статусы прочтения/счётчики непрочитанных (read_at) — 7.3; rate-limit/жалоба на сообщение (target_type=message, ADR-033)/блокировка в чате — 7.4; пагинация истории «до сообщения X» — на будущее (сейчас последние N)"
  - stage_id: "6.4"
    title: "Жалобы и баны: POST /reports (аутентифицированный) + очередь жалоб, действия модератора (dismiss/warn/takedown), баны temporary/permanent/shadow — takedown→bozor.ad.blocked (снятие из любого статуса), ban→bozor.user.banned→Auth отзывает сессии; CHAPTER 6 завершён"
    completed_date: "2026-07-09"
    evidence: "Жалобы и баны поверх сервиса moderation (ADR-033; ARCHITECTURE §4.11; завершение CHAPTER 6). Миграция 00003: reports (id, reporter_id, target_type CHECK ad|user|message, target_id, reason, status CHECK open|resolved|dismissed, resolution, resolved_by, resolved_at, created_at; idx status+created_at, idx target_type+target_id), bans (id, user_id, type CHECK temporary|permanent|shadow, reason, expires_at, created_by, created_at; idx user_id). domain: report.go (TargetAd/User/Message, ReportOpen/Resolved/Dismissed, ActionDismiss/Warn/Takedown, ValidateReportInput, ValidateAction [takedown только для ad→ErrTakedownTarget], ResolvedStatus), ban.go (BanTemporary/Permanent/Shadow, ValidateBanInput [temporary требует duration>0→ErrBanDurationRequired], BanExpiry). Ключевое решение takedown: НОВОЕ событие bozor.ad.blocked (payload ad_id/user_id/title/reason) вместо bozor.ad.rejected — Listing worker.Moderator.plan(eventType,current) переводит объявление в blocked из ЛЮБОГО статуса (машина состояний «любой→blocked»; skip если уже blocked), тогда как rejected остаётся мягким возвратом подачи (только pending→rejected, редактируемо). Так takedown реально снимает и опубликованные (active) объявления, а не только pending. repo: CreateReportWithEvent (+bozor.moderation.report_created), GetReport, ResolveReportWithEvent (условный UPDATE WHERE status=open + опц. событие одной tx), ListReports, CreateBanWithEvent (+bozor.user.banned). app.OpsService: CreateReport, ListReports, ResolveReport (takedownEvent обогащает владельца/заголовок из Listing → bozor.ad.blocked), BanUser (temporary/permanent/shadow → bozor.user.banned {user_id,type,reason,until}); ErrReportNotFound/ErrReportClosed. transport: POST /api/v1/reports (аутентифицированный пользователь, без requireStaff), staff — GET /api/v1/moderation/reports?status=, POST /api/v1/moderation/reports/{id}/resolve {action,note}, POST /api/v1/moderation/bans {user_id,type,reason,duration_seconds}. Auth: worker.Banner (консьюмер auth-ban на bozor.user.banned, maxDeliver=3) → repo.BanUser (tx: UPDATE users SET status=banned WHERE status<>deleted + UPDATE refresh_tokens SET revoked_at=now() WHERE revoked_at IS NULL, возвращает число отозванных; идемпотентно). Notification: bozor.ad.blocked→группа ad_status (шаблон uz/ru «объявление снято с публикации»+причина), bozor.user.banned уже потреблялось (GroupNone, всегда). gateway: маршрут /api/v1/reports→moderation (перед /api/v1/moderation). Тесты: unit domain (report: валидация target/reason, ValidateAction takedown-только-ad, ResolvedStatus; ban: типы, temporary-требует-срок, BanExpiry) + app (CreateReport, takedown→bozor.ad.blocked+обогащение, takedown-на-user→ErrTakedownTarget, resolve закрытой→ErrReportClosed, BanUser payload) + transport (reports create 201 аутентиф., staff list/resolve/ban, 403 не-staff) + worker listing (block active→blocked from current, уже-blocked→MarkProcessed) + worker auth (Banner отзывает сессии, пустой user_id→ошибка) + integration на testcontainers postgres (moderation: report create/list/resolve+outbox bozor.ad.blocked=1, dismiss без события, ban temporary+expires_at; auth: BanUser status=banned+2 токена отозваны+идемпотентность) — go test PASS (unit + moderation/auth integration ~27s каждый); golangci-lint 0 issues (все изменённые модули: pkg/shared, listing, moderation, notification, auth); gofmt чисто. Живая проверка (listing/moderation/notification пересобраны healthy, миграция 00003 applied=1, auth ban-консьюмер запущен): пользователь пожаловался на АКТИВНОЕ объявление «Продам ноутбук Lenovo» (reason «Запрещённый товар»)→201, в очереди open; staff takedown {action:takedown,note:«нарушение правил»}→200, report resolved; bozor.ad.blocked в outbox доставлено (relayed), Listing-inbox отметил, объявление active→BLOCKED (ключевая проверка — раньше takedown active-объявления не снимал); владелец получил уведомление bozor.ad.blocked (в dev skipped/channel_disabled — нет токена бота, как у всех уведомлений). Бан: засеян auth-пользователь (status=active) с 2 активными refresh-токенами; staff POST /moderation/bans {temporary, 86400s}→201 {expires_at}; bozor.user.banned→Auth: users.status=banned, оба токена revoked (active_tokens=0), ban-запись temporary+expires_at; Notification создал уведомление bozor.user.banned. Прим.: enforcement shadow-бана и авто-разбан по expires_at — на будущее (тип/срок хранятся); дедуп повторных жалоб и восстановление blocked-объявления — условия пересмотра ADR-033; target_type=message заработает после Chat (глава 7)"
  - stage_id: "6.3"
    title: "Ручные действия модератора: approve/reject(причина)/request-edit над задачами ручной очереди — API под ролью moderator/admin, публикует bozor.ad.approved|rejected"
    completed_date: "2026-07-09"
    evidence: "Ручная модерация поверх сервиса moderation (ADR-032; ARCHITECTURE §4.11; продолжение 6.2). Миграция 00002: moderation_tasks += decided_by uuid (модератор), comment text (причина reject/пояснение request-edit), decided_at timestamptz. domain: StatusEditRequested (возврат на доработку); ReasonMaxLen=500 рун; ValidateReason (обязательна, TrimSpace, лимит рун) + ErrReasonRequired/ErrReasonTooLong; Task += DecidedBy/Comment/DecidedAt. repo: GetTask (по ad_id, found), DecideWithEvent (условный UPDATE SET status/decided_by/comment/decided_at WHERE ad_id AND status='manual' [защита от гонок] → RowsAffected=0: applied=false; иначе outbox.Enqueue события одной tx). app.Service (ручные use-cases): Approve (→StatusApproved, bozor.ad.approved {ad_id,user_id,title}), Reject (ValidateReason→StatusRejected, bozor.ad.rejected {ad_id,user_id,title,reason,request_edit:false}), RequestEdit (ValidateReason→StatusEditRequested, bozor.ad.rejected {…,request_edit:true}); decide: GetTask→404 ErrTaskNotFound / не-manual→409 ErrNotPending → build событие → DecideWithEvent → applied=false→ErrNotPending (гонка). transport.DecisionHandler: POST /api/v1/moderation/tasks/{adId}/approve|reject|request-edit (staff-only, тот же requireStaff admin/moderator); reject/request-edit требуют {reason}; DecodeJSON maxBody 8KiB; ErrTaskNotFound→404 task_not_found, ErrNotPending→409 task_not_pending, ErrReasonRequired→422 reason_required, ErrReasonTooLong→422 reason_too_long; moderatorID из authx.UserID (проброшенная идентичность). router+main: DecisionHandler в Deps, app.NewService(store). Listing worker.Moderator (3.4) на bozor.ad.rejected→status rejected (editable→автор правит→submit→pending→ПОВТОРНАЯ авто-модерация консьюмером 6.2); bozor.ad.approved→active. Notification (6.1) на bozor.ad.rejected рендерит причину. Тесты: unit domain (ValidateReason: ok/пусто/пробелы/лимит рун) + app (Approve событие+payload, Reject статус/причина/request_edit=false, RequestEdit request_edit=true, пустая причина→ErrReasonRequired без стора, not-found→ErrTaskNotFound, уже-решена→ErrNotPending без стора, гонка applied=false→ErrNotPending) + transport (approve/reject/request-edit 200 с прокидыванием adId/moderator/reason, 403 не-staff, 401 аноним, 404 not-found, 409 not-pending, 422 reason-required) + integration на testcontainers postgres (GetTask found/not-found, DecideWithEvent обновляет статус/decided_by/comment/decided_at + outbox bozor.ad.rejected=1, повтор по не-manual→applied=false без нового события) — go test PASS (unit + integration 18.0s); golangci-lint 0 issues (12 модулей); gofmt чисто. Живая проверка (moderation пересобран, миграция 00002 applied=1): в ручной очереди 2 задачи из 6.2 (Копия iPhone [stopword], дубль ноутбук [duplicate]); reject Копия→200 {action:rejected}, задача rejected + comment 'Контрафакт: копия бренда' (char_length=24/octet=66 — валидный UTF-8), bozor.ad.rejected→Listing объявление rejected; approve дубль-ноутбук→200 {action:approved}→Listing active; reject без причины→422 reason_required, approve уже-решённой→409 task_not_pending, approve несуществующей→404 task_not_found, роль user→403, аноним→401. ПОЛНЫЙ ЦИКЛ request-edit→повторная модерация: объявление со стоп-словами (подделка/реплика)→auto manual; request-edit→200 {action:edit_requested}, задача edit_requested, bozor.ad.rejected(request_edit=true)→Listing rejected(editable); автор правит (убрал стоп-слова)+resubmit(pending)→консьюмер 6.2 переоценил→чисто→auto-approved→Listing active. Прим.: decided_by=uuid (X-User-Id из JWT sub всегда UUID; прямой вызов с не-UUID даёт 500 — не прод-сценарий, gateway ставит валидный); reject и request-edit оба дают Listing rejected (editable) — различие в task-статусе (rejected|edit_requested) и payload request_edit для Notification; жалобы/баны — Stage 6.4 (CHAPTER 6 DoD)"
  - stage_id: "6.2"
    title: "Moderation-сервис: очередь + авто-проверки — moderation_tasks на bozor.ad.created|updated(pending), стоп-слова uz/ru/запрещённые категории/дубли, pass→bozor.ad.approved→active, fail→ручная очередь"
    completed_date: "2026-07-09"
    evidence: "Новый сервис bozor/services/moderation (БД bozor_moderation, dev-порт 8091; ADR-031; ARCHITECTURE §4.11). Миграция 00001: moderation_tasks (id, ad_id UNIQUE [одна актуальная задача на объявление; повторная модерация правки перезаписывает], user_id, title, content_hash [нормализованный хэш title+description — детекция дублей], status [approved|manual|rejected], auto_result [passed|flagged], reasons jsonb; idx status+created_at DESC [очередь], idx user_id+content_hash [дубли]), stopwords (word+lang UNIQUE, active; СИД базового словаря uz/ru «копия/реплика/подделка/под оригинал» + nusxa/replika/soxta через gen_random_uuid, ON CONFLICT DO NOTHING), forbidden_categories (category_id PK, пусто по умолчанию — наполняет админ), processed_events (inbox, DDL синхр. с pkg/shared/outbox), outbox (+idx unpublished). domain: статусы/результаты/причины (stopword:<слово>/forbidden_category/duplicate); Normalize (нижний регистр, ё→е, схлопнутые пробелы) — инвариант сопоставления; ContentHash (sha256 нормализованного title+\\0+description); MatchedStopwords (подстрока без регистра по title+description, без дублей); Evaluate (собирает причины; пусто=прошло). listingclient: GetAd — читает /internal/ads/{id} (title/description/category/status — источник истины; 404→удалено). repo: ActiveStopwords, IsForbiddenCategory, HasDuplicate (другое объявление того же user с тем же content_hash, исключая своё ad_id), AlreadyProcessed, SaveApprovedTask (одна tx: upsert задачи по ad_id + MarkProcessed[inbox] + outbox.Enqueue bozor.ad.approved), SaveManualTask (upsert задачи manual + MarkProcessed, без события), MarkProcessed (объявление удалено/не pending), ListTasks (по статусу). worker.Moderator (консьюмер moderation-auto на bozor.ad.created|updated, maxDeliver=5→DLQ): модерирует ТОЛЬКО status=pending (иначе Ack без fetch — экономия на драфтах/активных), inbox-дедуп по event_id, GetAd (перепроверка ad.status==pending — источник истины), autoCheck (стоп-слова+запрещённая категория+дубли) → пусто: task approved + bozor.ad.approved {ad_id,user_id,title} (→ Listing активирует, Search индексирует, matcher матчит, Notification уведомляет); флаги: task manual (ручная очередь 6.3, объявление остаётся pending). transport: GET /api/v1/moderation/tasks?status=&limit= (ТОЛЬКО персонал — requireStaff admin/moderator из X-User-Roles; по умолчанию status=manual, clamp 50/200); DTO taskDTO с reasons; 401 аноним/403 не-персонал/422 invalid_status. main: миграции+otel+metrics+pgx+NATS(relay bozor.ad.approved + консьюмер bozor.ad.created|updated), health/ready[postgres,nats]. config: LISTING_INTERNAL_URL. Dockerfile distroless; compose: сервис moderation (dep postgres/pgbouncer/nats healthy, dev-порт 8091 [8090 занят nginx]) + prometheus scrape-job; БД bozor_moderation уже в postgres-init; gateway /api/v1/moderation уже вёл. Тесты: unit domain (Normalize регистр/ё/пробелы, ContentHash инвариант+различие, MatchedStopwords ru+uz/без-дублей/чисто, Evaluate) + worker (clean→approved+событие, стоп-слово→manual, запрещённая категория→manual, дубль→manual, не-pending→skip без fetch, ad-not-found→MarkProcessed, ad-ушёл-из-pending→MarkProcessed, already-processed→skip, пустой ad_id→ошибка) + transport (401 аноним/403 user/200 moderator с очередью/422 invalid-status/clamp limit) + integration на testcontainers postgres (стоп-слова сидированы≥7, forbidden category, ApprovedTask: задача+inbox+outbox bozor.ad.approved=1, ManualTask+HasDuplicate [чужое ad_id дубль, своё нет], upsert по ad_id: manual→approved одной строкой) — go test PASS (unit + integration 16.2s); golangci-lint 0 issues (весь воркспейс, 12 модулей); gofmt чисто. Живая проверка (moderation healthy, миграция applied=1, стоп-слова сидированы): в bozor_listing засеяны 2 pending-объявления (чистое «Продам ноутбук Lenovo» + со стоп-словами «Копия iPhone 15 / точная реплика под оригинал»), publish bozor.ad.updated(pending) для каждого → moderation: чистое→approved/passed→bozor.ad.approved→Listing worker.Moderator активировал (ads.status active); стоп-слово→manual/flagged reasons=[stopword:копия,stopword:под оригинал,stopword:реплика], объявление осталось pending (события approved нет); третье объявление того же user с идентичным содержимым→manual/[duplicate] (детекция дублей). HTTP :8091 GET /api/v1/moderation/tasks: moderator→очередь manual (задача с reasons), admin?status=approved→одобренное, аноним→401, роль user→403 forbidden, status=weird→422 invalid_status. Полная интеграция цепочки доказана вживую: bozor.ad.updated(pending)→авто-модерация→(pass) bozor.ad.approved→Listing активация. Прим.: ручные действия approve/reject/request-edit — Stage 6.3 (задачи manual ждут модератора); проверки изображений (NSFW) — на будущее (ARCHITECTURE §4.11); forbidden_categories пуста по умолчанию (наполняет админ); категория оценивается точным членством (не иерархически)"
  - stage_id: "6.1"
    title: "Notification-сервис: событийные уведомления через Telegram — локализованные шаблоны uz/ru, учёт notification_prefs, rate limiting, статусы доставки, ретраи с backoff, DLQ; CHAPTER 6 начат"
    completed_date: "2026-07-09"
    evidence: "Новый сервис bozor/services/notification (БД bozor_notification, dev-порт 8089; ADR-030; ARCHITECTURE §4.10). Канал v1 — Telegram Bot API (абстракция канала за интерфейсом Sender). Миграция 00001: recipients (user_id PK, telegram_user_id bigint [chat_id], language_code, updated_at — проекция получателя, единственный источник telegram_user_id = событие bozor.user.created), notifications (id, event_id UNIQUE [идемпотентность по конверту события], user_id, event_type [subject], channel, payload_json, body [отрендеренный текст], status [pending|sent|failed|skipped], reason, attempts, created_at, sent_at; idx user+created_at DESC). Outbox НЕ нужен (сервис — терминальный потребитель, событий не публикует). domain: статусы/причины (prefs_disabled/no_recipient/channel_disabled/permanent_error), группы настроек (ad_status/chat_message/saved_search/review/promotion) = типы notification_prefs User/Profile; subjectGroups маппит 11 subjects на группу (bozor.user.banned → GroupNone = уведомлять всегда, минуя настройки); Subjects() — список фильтра консьюмера; EventPayload (объединённая нагрузка: user_id-получатель, title/name/reason/amount/currency/sender_name/until); шаблоны template.go — локализованные uz/ru по каждому типу события (Render(subject,lang,payload); pick по языку; NormalizeLang uz/ru). telegram.Client: Send(chatID,text) через POST /bot<token>/sendMessage; пустой токен → ErrDisabled (канал отключён — dev без бота); классификация ответа — SendError{Code,Description,RetryAfter,Retryable}: 429 (retry_after) и 5xx/сеть → повторяемо, 400/401/403/404 → постоянно. prefs.Client: fetch-current-state из User/Profile GET /internal/users/{id}/notification-prefs с TTL-кешем (не бить в Profile на всплесках); Enabled(userID,group) — «отсутствие=включено», GroupNone всегда true. repo: UpsertRecipient (идемпотентно ON CONFLICT), GetRecipient, RecordSkipped (терминально, ON CONFLICT DO NOTHING по event_id), BeginDelivery (INSERT pending attempts=1 / ON CONFLICT увеличить attempts, RETURNING status → proceed только для pending: идемпотентность), MarkSent/MarkFailed/MarkSkipped, ListByUser. notify.Handler (консьюмер notification-delivery на 11 subjects, maxDeliver=5→DLQ): маппинг subject→группа, получатель из payload (нет → Ack-пропуск), канал отключён → skip(channel_disabled), нет проекции получателя → ошибка (Nak, ждём лаг bozor.user.created), prefs.Enabled (ошибка Profile → Nak) → выкл → skip(prefs_disabled), Render по языку получателя, BeginDelivery (идемпотентно), rate-limit (x/time/rate token-bucket), Send → sent / постоянная ошибка → failed(Ack) / повторяемая → Nak(backoff); бан минует настройки. notify.Recipients (консьюмер notification-recipients на bozor.user.created): проекция user_id→telegram_user_id+язык (upsert идемпотентен, inbox не нужен). transport: GET /api/v1/notifications (владелец из идентичности) — история со статусами доставки, clamp limit 30/100. main: миграции+otel+metrics+pgx+два консьюмера+telegram+prefs+rate.Limiter; канал отключён при пустом токене (warn). User/Profile: добавлен внутренний GET /internal/users/{id}/notification-prefs (без авторизации, только внутр. сеть — как /internal/ads Listing) → эффективные prefs. config/compose/.env(.example): PROFILE_INTERNAL_URL, TELEGRAM_BOT_TOKEN (общий с Auth; пусто→skipped), TELEGRAM_API_BASE (override для self-hosted/тестов), NOTIFY_RATE_PER_SEC(25)/NOTIFY_RATE_BURST(25)/NOTIFY_PREFS_CACHE_TTL(30s)/NOTIFY_MAX_DELIVER(5); notification-сервис (dep postgres/pgbouncer/nats healthy, dev-порт 8089) + prometheus scrape-job; БД bozor_notification уже в postgres-init. Тесты: unit domain (PrefGroup все 11 subjects+неизвестный, Subjects покрывают шаблоны uz≠ru, Render локализация/rejected-с-причиной/деньги/неизвестный, NormalizeLang) + telegram (Disabled без токена, Success, 429 retry_after retryable, 5xx retryable, 403 permanent, сеть retryable — httptest) + prefs (GroupNone без запроса, чтение+кеш один HTTP-вызов, истечение TTL, 500→ошибка) + notify handler (happy→sent, prefs-выкл→skipped, бан минует prefs, нет получателя→Nak, канал выкл→skipped, нет user_id→Ack, постоянная→failed-Ack, повторяемая→Nak-pending, идемпотентность 1 отправка на повтор, retry-then-succeed attempts=2, prefs-ошибка→Nak) + recipients (проекция+нормализация языка, нет полей→ошибка) + transport (401, история со статусами+sent_at, clamp) + integration на testcontainers postgres (recipient upsert идемпотентен, delivery lifecycle pending→sent+идемпотентность+attempts, RecordSkipped идемпотентен, MarkFailed/MarkSkipped) — go test PASS (unit + integration 12.2s); golangci-lint 0 issues (весь воркспейс, 11 модулей); gofmt чисто. Живая проверка (notification+user-profile пересобраны healthy, миграция applied=1, mock Bot API [nginx {\"ok\":true}] в сети bozor_bozor, TELEGRAM_API_BASE→mock, токен задан): publish bozor.user.created → «получатель спроецирован» (recipients); publish bozor.saved_search.matched/bozor.ad.approved/bozor.user.banned → все status=sent, attempts=1, sent_at≠null, body локализован (ru: «✅ Ваше объявление…одобрено», «🚫 …заблокирован. Причина:…»); uz-получатель → тело на узбекском («e'loni muddati tugadi», «saqlangan qidiruv»); идемпотентность: тот же event_id дважды → 1 строка, 1 отправка; prefs-выкл (INSERT notification_prefs saved_search=false в bozor_profile) → bozor.saved_search.matched status=skipped/prefs_disabled, а bozor.ad.approved (группа ad_status, вкл) → sent; канал без токена → skipped/channel_disabled (первый прогон). GET /api/v1/notifications (X-User-Id) → история со статусами. Internal-эндпоинт User/Profile /internal/users/{id}/notification-prefs → 5 групп enabled=true по умолчанию. После проверки среда возвращена к дефолту (пустой токен → канал отключён), mock удалён. Прим.: батчинг-дайджест на получателя отложен (анти-лавина уже в источнике — matcher 5.3 троттлит; глобальный rate-limit защищает Bot API); ретраи/backoff/DLQ — механизмом natsx (Nak→{1s,5s,15s}→DLQ); consumers bozor.chat.message_sent/promotion/payment/review активны, но их издатели появятся в CHAPTER 7-9 (контракт payload зафиксирован: получатель в user_id)"
