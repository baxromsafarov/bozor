рево вложенное через gateway; запись без auth через gateway→401, user→403, admin/moderator→201; кеш catalog:tree warm→invalidate-on-write→repopulate; slug-конфликт 409, delete-with-children 409, leaf 204, unknown 404; bozor.category.* published=t (relay→NATS, стрим растёт); Prometheus up{job=catalog}=1"
