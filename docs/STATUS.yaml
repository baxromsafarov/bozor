    title: "Chat WebSocket + backplane — эндпоинт /ws с самостоятельной JWT-аутентификацией (мимо gateway), доставка между репликами через NATS core pub/sub (chat.rt.<userID>), отправка по WS через app.SendMessage"
    completed_date: "2026-07-10"
    evidence: "Realtime-транспорт чата (ADR-035; ARCHITECTURE §4.9; ROADMAP 7.2). Пакет internal/ws: Backplane (интерфейс Publish/Subscribe + NATSBackplane на core pub/sub — эфемерная доставка, не JetStream; subject chat.rt.<userID>), Hub (реестр локальных соединений реплики + одна подписка backplane на пользователя с refcount по числу соединений, доставка входящего кадра во все локальные сокеты пользователя, Publish→backplane), Conn (буферизированный канал send=32, closeSlow при переполнении — медленный клиент отключается, переподключится и перечитает историю REST), Handler (ServeWS: authx.Parse токена [query ?token= или Authorization: Bearer] → 401 до апгрейда при невалидном; websocket.Accept с InsecureSkipVerify [CSWSH неактуален при bearer-аутентификации, не куки; TLS-край nginx]; регистрация в Hub; отдельные горутины writeLoop [единственный писатель тянет send-буфер — coder/websocket запрещает конкурентную запись] и readLoop [клиентские кадры {conversation_id, body} → app.SendMessage → publish адресату в backplane + ack отправителю]; контекст соединения отменяется при закрытии сокета ИЛИ baseCtx [graceful shutdown]), frame (кадры message/ack/error, JSON). app.SendMessage теперь возвращает (Message, recipientID, error) — id адресата для realtime-доставки (REST игнорирует третье значение). Протокол WS: client→server {conversation_id, body}; server→client {type:message|ack|error,…}. config/compose: JWT_SIGNING_KEY добавлен в Chat (обязателен — /ws мимо gateway). Роутер: r.Get(/ws) без auth-middleware (обработчик сам аутентифицирует). nginx уже проксирует location /ws→chat с upgrade-заголовками (задел). Зависимости: github.com/coder/websocket v1.8.14, github.com/nats-io/nats.go (core pub/sub поверх того же nats.Conn, что и JetStream-outbox). Тесты: unit ws (Hub: одна подписка на пользователя+refcount, отписка при последнем соединении, доставка во все локальные соединения, Publish→backplane, доставка неизвестному без паники; frame: token query/header/пусто, classify ошибок, JSON-форма message/ack/error) + in-process integration (loopback-backplane синхронно вызывает подписчиков как NATS на одном узле; httptest+websocket.Dial: bad-token→401, отправка→ack отправителю+кадр message получателю через backplane с корректными полями, не-участник→кадр error forbidden) — go test PASS; golangci-lint 0 issues; gofmt чисто. Живая проверка (ДВЕ реплики chat: :8092 [compose] и :8093 [docker run на той же сети/NATS], общий backplane): временный e2e-клиент минтит JWT покупателя/продавца тем же ключом; продавец подключается к РЕПЛИКЕ B, покупатель к РЕПЛИКЕ A и шлёт сообщение по WS → покупатель получил ack, продавец получил кадр message через NATS-backplane (cross-replica доставка — ключевая проверка 7.2); тот же сценарий обе стороны на одной реплике — тоже доставка; сообщение сохранено в bozor_chat.messages (валидный UTF-8), bozor.chat.message_sent в outbox relayed (тот же путь app.SendMessage, что и REST 7.1); WS без токена/мусорный токен→401. После проверки реплика 2 удалена, временный e2e-клиент удалён. Прим.: гейтинг публикации bozor.chat.message_sent по онлайн-статусу получателя — 7.3 (сейчас публикуется на каждое сообщение, 7.1 baseline; presence через Redis/NATS request-reply); отметки прочтения (read_at)/счётчики непрочитанных — 7.3; sticky-балансировка WS на nginx — оптимизация (backplane делает доставку независимой от реплики); ping/pong keepalive, лимиты соединений на пользователя, rate-limit/жалоба на сообщение — 7.4"
  - stage_id: "7.1"
    title: "Chat-сервис: модель диалогов + REST-история — conversations (уникальность ad_id+buyer_id+seller_id)/messages, продавец из Listing, POST/GET conversations+messages, публикация bozor.chat.message_sent→Notification; CHAPTER 7 начат"
    completed_date: "2026-07-10"
    evidence: "Новый сервис bozor/services/chat (БД bozor_chat, dev-порт 8092; ADR-034; ARCHITECTURE §4.9; ROADMAP 7.1). Миграция 00001: conversations (id, ad_id, buyer_id [инициатор], seller_id [владелец], created_at, last_message_at, UNIQUE (ad_id, buyer_id, seller_id) — один диалог на пару по объявлению; idx buyer/seller + last_message_at DESC), messages (id, conversation_id FK ON DELETE CASCADE, sender_id, body, created_at, read_at [задел под счётчики непрочитанных 7.3]; idx conversation+created_at), outbox (+idx unpublished; inbox не нужен — сервис в 7.1 только публикует). domain: Conversation/Message, Participant (покупатель или продавец), Counterpart (адресат сообщения = второй участник), ValidateBody (непустое после TrimSpace, ≤BodyMaxLen=4000 рун), AdView; ошибки ErrSelfConversation/ErrEmptyBody/ErrBodyTooLong/ErrNotParticipant/ErrConversationNotFound/ErrAdNotFound. listingclient: GetAd → /internal/ads/{id} (продавец = владелец, статус; 404→нельзя начать; fetch-current-state как модерация/индексатор). repo: EnsureConversation (UPSERT ON CONFLICT (ad_id,buyer_id,seller_id) DO UPDATE SET ad_id=EXCLUDED.ad_id RETURNING * — возвращает существующую строку без дублей), GetConversation, ListConversations (WHERE buyer_id=$1 OR seller_id=$1 ORDER BY last_message_at DESC), ListMessages (последние N в хронологии — подзапрос DESC LIMIT + внешний ASC), InsertMessageWithEvent (одной tx: INSERT message + UPDATE last_message_at + outbox.Enqueue). app.Service: StartConversation (GetAd→продавец; buyer==seller→ErrSelfConversation; EnsureConversation), SendMessage (ValidateBody→GetConversation→Participant-guard→INSERT+bozor.chat.message_sent {user_id:адресат, conversation_id, ad_id, sender_id, message_id}), ListConversations, ListMessages (Participant-guard). transport: requireAuth (аноним→401), POST /api/v1/conversations {ad_id}, GET /api/v1/conversations, POST /api/v1/conversations/{id}/messages {body}, GET /api/v1/conversations/{id}/messages; clamp лимитов (conv 50/100, msg