    evidence: "services/listing (модуль bozor/services/listing в go.work; БД bozor_listing). Миграция 00001: ads (UUIDv7, price bigint тийины CHECK>=0, currency, region_id/city_id/lat/lng, status CHECK 8 значений, phone_display, contact_prefs jsonb, published/expires/bumped_at, views_count; индексы user_status/status_published/category/expires-partial-active) + ad_attribute_values (PK ad_id+slug, FK CASCADE) + ad_images (PK ad_id+media_id, FK CASCADE, частичный UNIQUE обложки, индекс порядка) + outbox. Кросс-БД FK на category/region/media НЕТ (db-per-service). domain: статусная машина CanTransitionTo (draft→pending→active→sold/expired/archived; rejected↔pending; любой→blocked), ValidateCore/ValidateImages (лимит 10 + одна обложка); AttrSpec + ValidateAttributes — валидация значений против эффективного набора Catalog (неизвестный/обязательный/тип enum-int-decimal-bool-string). repo: CreateWithEvent (ad+атрибуты+изображения+outbox одной tx), GetByID (с детьми). app: CatalogValidator интерфейс + Create (draft, bozor.ad.created)/Get. ПЕРВЫЙ gRPC-контракт проекта (ADR-019): proto/catalog/v1 (GetEffectiveAttributes(category_id)→AttributeSpec{slug,type,required,options}, NOT_FOUND) → buf generate → pkg/shared/pb/catalog/v1 (make proto); catalog поднял gRPC-сервер на :9090 (grpcx otel+recovery) поверх app.AttributeService.Effective (grpcapi.Server); listing — gRPC-клиент (catalogclient) реализует app.CatalogValidator (codes.NotFound→ErrCategoryNotFound). transport HTTP: POST /api/v1/ads (owner из forwarded-идентичности→401, создание draft), GET /api/v1/ads/{id} публично; RFC 7807. config/main (миграции+otel+metrics+pgx+NATS/relay+gRPC-клиент), Dockerfile distroless, compose (listing-ads, dep catalog для gRPC, dev-порт 8085, scrape-job). Тесты: unit domain (статусная машина таблицей, валидация полей/изображений/атрибутов все ветки) + app (Create happy/category-not-found/unknown/missing-required/invalid-enum/core/too-many-images с фейковым валидатором) + transport (401/201/422×3/404/invalid_json с фейковым Service) + integration на testcontainers postgres (CreateWithEvent+GetByID с атрибутами по slug/изображениями по sort_order+outbox=1; каскад удаления детей; not-found) — go test PASS (default+integration 9.3s); golangci-lint 0 issues (listing default+integration, catalog); gofmt чисто; go work sync — все 7 модулей build/vet/test зелёные. Живая проверка (catalog+listing-ads healthy, gRPC :9090, миграция applied=1): создание объявления в cars через gateway (JWT→X-User-Id) с brand=toyota(enum)/year=2015(int)/mileage=120000 → 201 draft; строки в ads (title/price/status draft) + 3 ad_attribute_values + 1 ad_images(cover) + bozor.ad.created published=t (relay→NATS); НЕВАЛИДНЫЙ enum brand=lada→422 invalid_attribute_value; неизвестный атрибут color→422 unknown_attribute; отсутствует обязательный brand→422 missing_required_attribute; НЕСУЩЕСТВУЮЩАЯ категория→422 category_not_found (сквозь gRPC NOT_FOUND — межсервисная валидация Listing→Catalog доказана вживую); аноним→401; GET /ads/{id}→200 с атрибутами+изображениями"
  - stage_id: "3.2"
    title: "Воркер обработки медиа — превью 120/480/1080, снятие EXIF, presigned/CDN, очистка сирот"
    completed_date: "2026-07-09"
    evidence: "Media-сервис — первый консьюмер событий в проекте. Миграция 00002_media_processing: media += processed_at, previews jsonb DEFAULT '[]'; таблица processed_events (inbox-идемпотентность, DDL синхр. с pkg/shared/outbox). Пакет imaging (чистый Go, без cgo — github.com/disintegration/imaging + golang.org/x/image/webp): Decode с AutoOrientation (разворот по EXIF), Fit (Lanczos, вписывание БЕЗ увеличения), Encode (JPEG q82 / PNG для png-источника). Воркер (internal/worker): Processor.Handle потребляет bozor.media.uploaded (natsx.Consume, durable media-processor, maxDeliver=3→DLQ) — проверка inbox, GetByID, снятие EXIF повторным кодированием (перезапись оригинала по тому же object_key), генерация превью previews/<id>/<size>.<ext> с дедупом по фактическому размеру, атомарно uploaded→ready + событие bozor.media.processed + отметка inbox (MarkProcessedWithEvent, переход только из uploaded → идемпотентно); отсутствующее/уже готовое медиа — только отметка inbox. Cleaner: тикер MEDIA_CLEAN_INTERVAL удаляет сирот (ad_id IS NULL старше MEDIA_ORPHAN_TTL) пакетами — объекты (оригинал+превью, RemoveObject идемпотентен) + запись/событие bozor.media.deleted в одной tx. storage += Get (чтение оригинала), PresignedURL. app.Get(requesterID): публичные URL превью (CDN-база) + владельцу presigned-ссылка на оригинал (MEDIA_PRESIGN_TTL). Транспорт: mediaResponse += previews[] и original_url (presigned, только владельцу). repo += IsEventProcessed/MarkEventProcessed/MarkProcessedWithEvent/ListOrphans/DeleteWithEvent; scanMedia читает previews/processed_at. Конфиг + compose + .env(.example): MEDIA_ORPHAN_TTL(24h)/MEDIA_CLEAN_INTERVAL(15m)/MEDIA_PRESIGN_TTL(15m). ADR-018. Тесты: unit imaging (dims, Fit-даунскейл/без-апскейла, JPEG/PNG), worker (генерация 3 превью+ready+событие, дедуп маленького оригинала→1 превью, идемпотентность/отсутствие/уже-ready, cleaner удаляет блобы+запись), app (previews в ответе, presigned владельцу/не чужому), transport (previews+original_url, проброс идентичности) + integration на testcontainers postgres (MarkProcessedWithEvent→ready+processed_at+previews+outbox=2+inbox, повтор идемпотентен без дубля события; MarkEventProcessed повтор; ListOrphans игнорирует привязанные/свежие; DeleteWithEvent+повтор→ErrMediaNotFound) — go test PASS (default+integration, 19.7s); golangci-lint 0 issues (оба тега); gofmt чисто; go work sync — все 6 модулей зелёные. Живая проверка (media healthy, миграция 00002 applied): upload 1600×1200 JPEG→201 uploaded; воркер→ready, width/height 1600×1200, 3 превью 120×90/480×360/1080×810 (аспект 4:3, без апскейла) — объекты в MinIO (120.jpg HTTP 200, валидный JPEG 120×90); оригинал перезаписан (165020→132605 байт); GET владельцем → previews[]+presigned original_url; bozor.media.uploaded+bozor.media.processed published=t, processed_events(media-processor)=1. EXIF: во внедрённый в JPEG маркер Exif+GPS после обработки отсутствует (grep=0) — снят повторным кодированием. Очистка сирот (короткий TTL 5s/интервал 10s): непривязанное медиа удалено (row 0, GET 404, оригинал 404), bozor.media.deleted published; лог 'очищены медиа-сироты count=…'; TTL возвращён к 24h/15m"
