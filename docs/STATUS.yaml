    evidence: "Новый сервис bozor/services/favorites-savedsearch (БД bozor_favorites, dev-порт 8088; ADR-028; каркас общий с сохранёнными поисками 5.3). Миграция 00001: favorites (PK user_id+ad_id, created_at; idx user+created_at DESC для ленты, idx ad_id для очистки; ad_id из Listing без кросс-БД FK). domain: Favorite, ErrInvalidAdID. repo: Add (INSERT ON CONFLICT (user_id,ad_id) DO UPDATE SET created_at=favorites.created_at RETURNING created_at — идемпотентно, сохраняет исходное время), Remove (DELETE, возвращает «существовала»), ListByUser (created_at DESC, keyset-независимая пагинация LIMIT/OFFSET), RemoveByAd (очистка по объявлению). app: Add/Remove (валидация ad_id как UUID→ErrInvalidAdID; существование объявления НЕ проверяется — децентрализация, удалённые чистит consumer), List (clampLimit 20/100, clampOffset), RemoveByAd; без событий-публикаций (у избранного их нет). worker.AdDeleted: консьюмер favorites-ad-deleted на bozor.ad.deleted (maxDeliver=3→DLQ; DELETE по ad_id идемпотентен — inbox не нужен). transport: chi + FromForwardedHeaders; POST /api/v1/favorites/{adId} (201 с ad_id/created_at), DELETE (204), GET /api/v1/me/favorites (список+limit/offset); 401 анониму, 422 invalid_ad_id. main: миграции+otel+metrics+pgx+NATS(консьюмер bozor.ad.deleted; relay не нужен — нет исходящих событий), health/ready[postgres,nats]. gateway: /api/v1/me/favorites→favorites-savedsearch добавлен перед /api/v1/me→user-profile (chi приоритет статического сегмента); /api/v1/favorites уже вёл на сервис. Dockerfile distroless (бинарь /favorites); compose-сервис (dep postgres/pgbouncer/nats healthy, dev :8088) + prometheus scrape + override-порт; БД bozor_favorites уже в postgres-init. Тесты: unit app (Add валидация UUID/идемпотентность, Remove идемпотентность/невалидный, List clamp, RemoveByAd для нескольких пользователей) + worker (RemoveByAd/пустой ad_id/ошибка БД→повтор) + transport (Add 201/401/422, Remove 204, List 200/401 через FromForwardedHeaders) + integration на testcontainers postgres (Add идемпотентен с сохранением created_at + лента DESC, Remove идемпотентен, RemoveByAd убирает у всех кроме прочих объявлений, пагинация LIMIT/OFFSET) + gateway (TestRoutes_MeFavoritesPrecedence: /me/favorites→favorites, /me→user-profile) — go test PASS (unit + integration 11.9s); golangci-lint 0 issues (default+integration); gofmt чисто; go work sync — все 10 модулей зелёные. Живая проверка (favorites-savedsearch+gateway healthy, миграция applied=1, таблица favorites): POST /favorites/{ad}→201 {ad_id,created_at}, повтор→то же created_at (идемпотентно); POST 2-го объявления; невалидный ad_id→422 invalid_ad_id; аноним→401; GET /me/favorites→оба, свежее сверху; DELETE→204, список сократился; publish bozor.ad.deleted(ad2) → consumer убрал (список пуст, лог 'объявление убрано из избранного removed=1'). Gateway :8080: /me/favorites и /favorites/{id}→favorites-savedsearch по access-логам, user-profile 0 обращений к me/favorites. Прим.: обогащение ленты данными объявлений (title/price) не входит в 5.2 — /me/favorites отдаёт ad_id+created_at; при необходимости — batch-запрос в Search/Listing позже"
