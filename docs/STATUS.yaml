ax→422; аноним GET и POST→401; ИНВАРИАНТ ЛЕДЖЕРА в БД: wallet_balance=80000 == ledger_sum(Σcredit−Σdebit)=80000, 4 проводки в 2 операциях, per_op_balanced=true (каждая операция credit=debit); маршрутизация gateway с минтованным JWT: GET /api/v1/me/wallet вернул кошелёк payments (не user-profile, доказ. специфичности префикса), POST /wallet/topup через gateway зачислил 25000, контрольный /api/v1/me по-прежнему→user-profile (200); /metrics 200. Прим.: пополнение через Payme/Click (двухфазный invoice→callback→Credit, идемпотентные колбэки, таблица payments, bozor.payment.succeeded|failed) — 8.3; списание при покупке услуги/набора (POST /ads/{id}/promote, saga) — 8.4; возвраты (refund пропорц. неиспользованным дням, bozor.wallet.refunded) — 8.7; reconciliation-сверка баланса с леджером и мультивалютность — на будущее (сейчас UZS)"
