    title: "Скелет docker-compose инфраструктуры платформы"
    completed_date: "2026-07-07"
    evidence: "deploy/compose/docker-compose.yml: postgres:18 (init-скрипт создаёт 12 БД по сервисам — проверено, count=12), pgbouncer (transaction + max_prepared_statements=200 для совместимости pgx cache_statement — ADR-013), redis:8 (appendonly=yes, allkeys-lru), nats:2.12 -js (JetStream проверен через /jsz), typesense:29 (healthcheck через bash /dev/tcp — в образе нет curl/wget/nc), minio + minio-init (бакет bozor-media + download policy). Все healthcheck'и, именованные volumes, сеть bozor. nginx.conf: /nginx-health→200, /api/→503 problem+json (gateway ещё нет), /ws для чата, / →404. override (dev: порты на 127.0.0.1) и prod-профиль (наружу только nginx 80/443, restart:always, лимиты логов). Makefile: up/up-prod/down/down-prod через COMPOSE_DEV/PROD (dev тянет override — иначе проброс портов терялся). Проверка: docker compose up -d → 7/7 healthy; nginx-роутинг, PgBouncer через 6432, JetStream, Redis, 12 БД — всё проверено вживую"
  - stage_id: "0.4"
    title: "API Gateway (chi): routing, JWT, rate-limit, CORS, RFC 7807"
    completed_date: "2026-07-07"
    evidence: "services/gateway (модуль bozor/services/gateway в go.work). Middleware-цепочка из pkg/shared (recover→request-id→lang→access-log→otel→CORS→strip-identity; под /api/v1: optional-auth→rate-limit→reverse-proxy). Optional-auth: проверка JWT если передан, иначе аноним; невалидный → 401 (ADR-014). Проброс идентичности: вычистка клиентских X-User-* + проставление из клеймов. Rate-limit: Redis token-bucket через atomic Lua (server TIME, TTL=полное пополнение), заголовки X-RateLimit-*, fail-open. Reverse-proxy по таблице префиксов на 13 сервисов; недоступность апстрима → 503 RFC 7807. CORS + preflight. Dockerfile multi-stage → distroless static nonroot, healthcheck без shell (/gateway -health). Тесты: unit (config, middleware, router — proxy/identity/strip/401/429/fail-open/CORS/404/503) + integration (Redis token-bucket, env-gated). go test ok; golangci-lint 0 issues (оба модуля). Живая проверка в compose: 8/8 healthy; /healthz 200, /readyz ready (redis), маршрут→503 upstream_unavailable, invalid JWT→401, CORS preflight→204, edge nginx→gateway с пробросом X-Request-Id, rate-limit: burst=3 → 3 пропущено (503) + 37×429 при 40 конкурентных запросах"
  - stage_id: "0.5"
    title: "Стек наблюдаемости: Tempo, Loki, Alloy, Prometheus, Grafana"
    completed_date: "2026-07-07"
    evidence: "deploy/observability/* + 5 сервисов в compose (ADR-015). Трейсы: gateway → OTLP → Tempo (проверено: tempo_distributor_spans_received_total>1200, поиск трасс по service.name=gateway). Метрики: новый otelx.SetupMetrics (OTel MeterProvider + Prometheus-экспортёр) → otelhttp пишет RED автоматически; /metrics на gateway; Prometheus scrape (job gateway up, http_server_request_duration_seconds с http_route/status, p95 считается). Логи: JSON stdout → Alloy (docker discovery, извлечение level/service/trace_id) → Loki (проверено: label svc=gateway). Grafana: provision источников (Prometheus/Loki/Tempo, derived field trace_id→Tempo) + 2 дашборда (Gateway RED, Infra Health/USE) — проверен end-to-end запрос через datasource proxy. Алерты: правила TargetDown/GatewayHighErrorRate/GatewayHighLatencyP95 в Prometheus. Живая проверка: 13/13 контейнеров healthy; go test + golangci-lint 0 issues (оба модуля). Alertmanager и cadvisor/node-exporter — отложены (в ADR-015)"
  - stage_id: "0.6"
    title: "Фреймворк миграций goose (forward-only) + сиды — CHAPTER 0 завершён"
    completed_date: "2026-07-08"
    evidence: "pkg/shared/migrate: Up(ctx, dsn, fs.FS) поверх goose v3 provider API (forward-only, только Up) с сессионным advisory-lock Postgres (goose.WithSessionLocker) для сериализации реплик; sql-драйвер pgx stdlib. Сиды = идемпотентные миграции (INSERT ... ON CONFLICT DO NOTHING), ADR-007. Godoc-пример подключения в сервисе + предупреждение: DSN напрямую к postgres:5432, НЕ через PgBouncer (сессионный лок несовместим с transaction-пулингом — ADR-013). Тесты: unit (bad/unparsable DSN) + integration на testcontainers-go (реальный postgres:18) — прогон с нуля (2 миграции), проверка сида (2 строки), идемпотентность повтора (0, без дублей), build-tag integration; go test -tags=integration PASS (8.9s). Makefile: цель test-integration. golangci-lint 0 issues (default и integration build)"
  - stage_id: "1.1"
    title: "Telegram webhook (secret token) + скелет Auth-сервиса + схема БД"
    completed_date: "2026-07-08"
    evidence: "services/auth (модуль bozor/services/auth в go.work). Миграция 00001_init_auth: users (telegram_user_id UNIQUE, phone, status CHECK), refresh_tokens (token_hash bytea UNIQUE, family_id, device_id — под ротацию/reuse-detection ADR-012), auth_audit_log, outbox (DDL синхр. с pkg/shared/outbox). Миграции применяются при старте через pkg/shared/migrate по прямому DSN к postgres:5432 (не PgBouncer, ADR-013); рантайм-пул — через pgbouncer:6432. Транспорт: chi + middleware из pkg/shared (recover/request-id/lang/access-log/otel) + health/ready(postgres ping)/metrics; POST /api/v1/auth/telegram/webhook — constant-time проверка X-Telegram-Bot-Api-Secret-Token, толерантный декодер update (payload Telegram шире модели). Dockerfile: build-local go.work (go work init pkg/shared + сервис) → distroless static nonroot, healthcheck /auth -health. Тесты unit (config DSN, webhook 401/200/422, tolerant, health, 404); golangci-lint 0 issues. Живая проверка: 14/14 healthy; миграции applied=1 (4 таблицы+goose), рестарт→applied=0 (идемпотентно); webhook 401/200/422 напрямую и через gateway (routing /api/v1/auth→auth, 200 не 503); Prometheus up{job=auth}=1; логи auth в Loki (svc=auth). Также починены Dockerfile'ы gateway/auth под рост go.work"
  - stage_id: "1.2"
    title: "Phone-auth flow: request_contact — валидация владения, E.164, upsert, публикация bozor.user.created"
    completed_date: "2026-07-08"
    evidence: "Домен: NormalizePhoneUZ (E.164 +998########, из 12 цифр с 998 или 9 цифр) + NormalizeLang; sentinel ErrContactNotOwned/ErrInvalidPhone. Транспорт webhook: на /start бот шлёт кнопку request_contact (SendContactRequest, ReplyKeyboard request_contact:true), на contact — RegisterContact; локализация uz/ru; вебхук всегда 2xx для Telegram, бизнес-ошибки уходят ответом бота. КРИТИЧНО для безопасности: contact.user_id должен ==from.id (иначе ErrContactNotOwned) — пересланный чужой контакт отклоняется («отправьте свой номер»). App: RegisterContact нормализует телефон, генерирует UUIDv7, строит событие userCreated БЕЗ PII (только user_id, telegram_user_id, language_code). Repo UpsertUserWithEvent: pgxx.WithTx → INSERT ... ON CONFLICT(telegram_user_id) DO UPDATE ... RETURNING (xmax=0) AS created; событие в outbox только при created=true (идемпотентно, повторный контакт не плодит события). Тесты: unit (нормализация телефона/языка, webhook: свой контакт регистрируется/пересланный отклоняется/start шлёт кнопку) + integration на testcontainers (реальный postgres:18: первый апсерт created=true + 1 событие; повтор created=false, событий по-прежнему 1, телефон обновлён) — go test -tags=integration PASS; golangci-lint 0 issues. Живая проверка end-to-end (14/14 healthy): вебхук с валидным контактом → пользователь в users + событие в outbox → outbox.Relay (SKIP LOCKED) публикует bozor.user.created в JetStream (published_at выставляется только после успешной публикации); подтверждено: стрим BOZOR messages=2, published=t по обоим событиям. Впервые вживую проверен весь путь событий webhook→БД+outbox(одна tx)→relay→NATS"

