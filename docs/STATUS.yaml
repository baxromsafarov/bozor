    completed_date: "2026-07-09"
    evidence: "Жизненный цикл объявления (ADR-020). Миграция 00002_listing_inbox: processed_events (inbox, DDL синхр. с pkg/shared/outbox). domain: статусная машина дополнена (active→pending — повторная модерация правки активного; expired→active — реактивация renew), тип StatusUpdate (From/To/PublishedAt/ExpiresAt; nil-время не сбрасывается). repo: execTransition (условный UPDATE WHERE status=$from, COALESCE времени) + TransitionWithEvent (действия владельца; 0 строк→ErrInvalidTransition) + ApplyModerationWithEvent (inbox + переход из pending + событие одной tx) + IsEventProcessed/MarkEventProcessed + ListExpired (active, expires_at<=now, idx_ads_expires) + ExpireWithEvent (active→expired с перепроверкой expires_at<=now(), возвращает «сменилось»). app.Service += adTTL; методы SubmitForModeration (draft|rejected→pending), MarkSold (active→sold), Archive (active→archived), Renew (active — сдвиг expires_at; expired→active — реактивация) — все проверяют владельца (ErrForbidden) и допустимость (ErrInvalidTransition) через общий transition; единый payload app.AdEvent (без PII; +status/published_at/expires_at для Search) для created/updated/sold/expired. worker (первые фоновые процессы Listing): Moderator (durable listing-moderation, потребляет bozor.ad.approved|rejected, maxDeliver=3→DLQ; inbox + guard status==pending; approve→active +published_at +expires_at=now+adTTL +bozor.ad.updated(active), reject→rejected) + Expirer (тикер LISTING_EXPIRE_INTERVAL, ListExpired→ExpireWithEvent пакетом LISTING_EXPIRE_BATCH, bozor.ad.expired). transport: POST /ads/{id}/submit|sold|renew|archive (владелец из forwarded-идентичности→401; ErrForbidden→403 forbidden; ErrInvalidTransition→409 invalid_transition); adResponse += published_at/expires_at. main: единый adRepo, natsx.Consume(listing-moderation) + goroutine Expirer; config LISTING_AD_TTL(720h)/LISTING_EXPIRE_INTERVAL(5m)/LISTING_EXPIRE_BATCH(100) + compose + .env(.example). Тесты: unit domain (переходы таблицей вкл. новые), app (submit happy/from-rejected/wrong-owner-403/not-found/invalid-from-sold; sold happy/not-active; renew active/expired/draft; archive), transport (submit 401/200, sold 403 forbidden, renew 409 invalid_transition, archive 404), worker (Moderator approve/reject/idempotent-skip/not-pending-mark/ad-missing-mark/unexpected-type/empty-id; Expirer sweep→status expired+событие/list-error) + integration на testcontainers postgres (TransitionWithEvent draft→pending и конфликт→ErrInvalidTransition без события; ApplyModeration идемпотентно — active+published/expires+inbox, повтор без 2-го события; ExpireFlow — ListExpired только active-истёкшие, ExpireWithEvent+повтор false, future-срок не истёк, ровно одно bozor.ad.expired) — go test PASS (default 0.04s + integration 15.8s); golangci-lint 0 issues (default+integration); gofmt чисто; go build — все 7 модулей зелёные. Живая проверка (listing-ads healthy, миграция 00002 applied=1, processed_events создана): create draft (cars, brand=toyota/year=2015) через :8085 → draft; submit→pending + bozor.ad.updated(pending); publish bozor.ad.approved (симуляция Moderation через JetStream) → active, published_at=t, expires_at=now+720h, bozor.ad.updated(active), processed_events(listing-moderation)=1; ПОВТОР того же approve (тот же event_id) → active-updated событий по-прежнему 1, inbox=1 (идемпотентно); reject другого объявления → rejected, затем submit→pending (повторная модерация); renew active сдвинул expires_at (14:10:55→14:12:47), renew expired→active (срок в будущем); чужой владелец /sold→403 forbidden, /sold на draft→409 invalid_transition; /sold→sold + bozor.ad.sold; approve+/archive→archived; воркер истечения (принудительно expires_at в прошлое, интервал 10s на время проверки) → expired + bozor.ad.expired, лог 'истёкшие объявления переведены в expired count=1'; все события в outbox published=t (relay→NATS); 4 валидных решения модерации в inbox. Прим.: POST /sold и /renew (перечислены и в 3.6) доставлены в 3.4 — в 3.6 остаются POST/GET/PATCH/DELETE /ads, лента и правка-с-повторной-модерацией поверх этой статусной машины"
  - stage_id: "3.3"
    title: "Listing-сервис: модель ads + gRPC-валидация атрибутов против Catalog — первый gRPC-контракт"
