# Провижининг источников данных Grafana (Prometheus, Loki, Tempo).
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Связь логов с трассами: из поля trace_id открывать трассу в Tempo.
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          datasourceUid: tempo
          url: '$${__value.raw}'

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
