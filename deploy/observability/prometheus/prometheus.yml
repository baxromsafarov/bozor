# Prometheus — сбор метрик сервисов и инфраструктуры.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: bozor-dev

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: auth
    metrics_path: /metrics
    static_configs:
      - targets: ["auth:8080"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
