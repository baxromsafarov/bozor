# Локальная разработка: проброс портов инфраструктуры на localhost.
# Применяется вместе с docker-compose.yml (make up).

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  pgbouncer:
    ports:
      - "127.0.0.1:6432:6432"
  redis:
    ports:
      - "127.0.0.1:6379:6379"
  nats:
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"   # мониторинг NATS
  typesense:
    ports:
      - "127.0.0.1:8108:8108"
  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"   # web-консоль MinIO
  gateway:
    ports:
      - "127.0.0.1:8080:8080"   # прямой доступ к gateway в обход nginx (dev)
  auth:
    ports:
      - "127.0.0.1:8081:8080"   # прямой доступ к auth (dev)
  location:
    ports:
      - "127.0.0.1:8082:8080"   # прямой доступ к location (dev)
  catalog:
    ports:
      - "127.0.0.1:8083:8080"   # прямой доступ к catalog (dev)
  media:
    ports:
      - "127.0.0.1:8084:8080"   # прямой доступ к media (dev)
  listing-ads:
    ports:
      - "127.0.0.1:8085:8080"   # прямой доступ к listing-ads (dev)
  search:
    ports:
      - "127.0.0.1:8086:8080"   # прямой доступ к search (dev)
  user-profile:
    ports:
      - "127.0.0.1:8087:8080"   # прямой доступ к user-profile (dev)
  favorites-savedsearch:
    ports:
      - "127.0.0.1:8088:8080"   # прямой доступ к favorites-savedsearch (dev)
  notification:
    ports:
      - "127.0.0.1:8089:8080"   # прямой доступ к notification (dev)
  moderation:
    ports:
      - "127.0.0.1:8091:8080"   # прямой доступ к moderation (dev)
  chat:
    ports:
      - "127.0.0.1:8092:8080"   # прямой доступ к chat (dev)
  payments-promotions:
    ports:
      - "127.0.0.1:8093:8080"   # прямой доступ к payments-promotions (dev)
  grafana:
    ports:
      - "127.0.0.1:3000:3000"   # UI Grafana
  prometheus:
    ports:
      - "127.0.0.1:9090:9090"   # UI Prometheus
  nginx:
    ports:
      - "127.0.0.1:8090:80"
