# Локальная разработка: проброс портов инфраструктуры на localhost.
# Применяется вместе с docker-compose.yml (make up).

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  pgbouncer:
    ports:
      - "127.0.0.1:6432:6432"
  redis:
    ports:
      - "127.0.0.1:6379:6379"
  nats:
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"   # мониторинг NATS
  typesense:
    ports:
      - "127.0.0.1:8108:8108"
  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"   # web-консоль MinIO
  gateway:
    ports:
      - "127.0.0.1:8080:8080"   # прямой доступ к gateway в обход nginx (dev)
  nginx:
    ports:
      - "127.0.0.1:8090:80"
