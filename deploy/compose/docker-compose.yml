# Bozor — базовая инфраструктура платформы (Stage 0.3).
# Запуск: make up (из корня репозитория, требуется .env — см. .env.example).
# Прикладные сервисы добавляются по мере реализации Stage'ей.

name: bozor

networks:
  bozor:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  nats_data:
  typesense_data:
  minio_data:

services:
  # ---------- PostgreSQL: один инстанс, отдельная БД на сервис ----------
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      # postgres:18+ хранит данные в подкаталоге /var/lib/postgresql/<major>/docker,
      # поэтому монтируем корень /var/lib/postgresql (см. docker-library/postgres#1259).
      - pg_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]
    # Тюнинг под средний хост; пересматривается на Stage 10.3
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c wal_level=replica

  # ---------- PgBouncer: transaction pooling перед PostgreSQL ----------
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      # Prepared statements в transaction-режиме (PgBouncer >= 1.21): без этого
      # pgx с дефолтным cache_statement ловит "prepared statement does not exist". См. ADR-013.
      MAX_PREPARED_STATEMENTS: "200"
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Redis: кеш, rate limiting, nonce, идемпотентность, WS-backplane ----------
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- NATS JetStream: брокер доменных событий ----------
  nats:
    image: nats:2.12-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Typesense: поисковый движок (read-модель листингов) ----------
  typesense:
    image: typesense/typesense:29.0
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data
    # В образе typesense нет curl/wget/nc — проверяем TCP+/health через bash (/bin/sh=dash не умеет /dev/tcp).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8108 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q ok <&3"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- MinIO: S3-совместимое хранилище медиа ----------
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # Одноразовая инициализация бакета медиа (public-read для отдачи через CDN)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${MEDIA_BUCKET} &&
      mc anonymous set download local/${MEDIA_BUCKET} &&
      echo 'bucket ready'
      "
    restart: "no"
    networks: [bozor]

  # ---------- nginx: edge (TLS, LB). Пока gateway не реализован — 503 на /api ----------
  nginx:
    image: nginx:1.29-alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pgbouncer
      - redis
      - nats
      - typesense
      - minio
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]
