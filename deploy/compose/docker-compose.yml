# Bozor — базовая инфраструктура платформы (Stage 0.3).
# Запуск: make up (из корня репозитория, требуется .env — см. .env.example).
# Прикладные сервисы добавляются по мере реализации Stage'ей.

name: bozor

networks:
  bozor:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  nats_data:
  typesense_data:
  minio_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:

services:
  # ---------- PostgreSQL: один инстанс, отдельная БД на сервис ----------
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      # postgres:18+ хранит данные в подкаталоге /var/lib/postgresql/<major>/docker,
      # поэтому монтируем корень /var/lib/postgresql (см. docker-library/postgres#1259).
      - pg_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]
    # Тюнинг под средний хост; пересматривается на Stage 10.3
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c wal_level=replica

  # ---------- PgBouncer: transaction pooling перед PostgreSQL ----------
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      # Prepared statements в transaction-режиме (PgBouncer >= 1.21): без этого
      # pgx с дефолтным cache_statement ловит "prepared statement does not exist". См. ADR-013.
      MAX_PREPARED_STATEMENTS: "200"
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Redis: кеш, rate limiting, nonce, идемпотентность, WS-backplane ----------
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- NATS JetStream: брокер доменных событий ----------
  nats:
    image: nats:2.12-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Typesense: поисковый движок (read-модель листингов) ----------
  typesense:
    image: typesense/typesense:29.0
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data
    # В образе typesense нет curl/wget/nc — проверяем TCP+/health через bash (/bin/sh=dash не умеет /dev/tcp).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8108 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q ok <&3"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- MinIO: S3-совместимое хранилище медиа ----------
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # Одноразовая инициализация бакета медиа (public-read для отдачи через CDN)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${MEDIA_BUCKET} &&
      mc anonymous set download local/${MEDIA_BUCKET} &&
      echo 'bucket ready'
      "
    restart: "no"
    networks: [bozor]

  # ---------- Tempo: приём и хранение трасс (OTLP) ----------
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3200/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [bozor]

  # ---------- Loki: приём и хранение логов ----------
  loki:
    image: grafana/loki:3.3.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [bozor]

  # ---------- Alloy: сбор логов контейнеров Docker → Loki ----------
  alloy:
    image: grafana/alloy:v1.5.0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks: [bozor]

  # ---------- Prometheus: сбор метрик, правила алертинга ----------
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/-/healthy | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks: [bozor]

  # ---------- Grafana: дашборды и провижининг источников данных ----------
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [bozor]

  # ---------- API Gateway: единая точка входа REST (chi), auth+rate-limit+routing ----------
  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    environment:
      GATEWAY_ADDR: ":8080"
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      redis:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "/gateway", "-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Auth: идентичность, Telegram phone-auth, JWT ----------
  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    environment:
      AUTH_ADDR: ":8080"
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGBOUNCER_HOST: ${PGBOUNCER_HOST}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:              # миграции идут напрямую к postgres:5432
        condition: service_healthy
      pgbouncer:             # рантайм-пул — через pgbouncer:6432
        condition: service_healthy
      redis:                 # nonce'ы логина (deep-link сессии)
        condition: service_healthy
      nats:                  # publish событий из outbox → JetStream
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "/auth", "-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Location: справочник регионов и городов Узбекистана ----------
  location:
    build:
      context: ../..
      dockerfile: services/location/Dockerfile
    environment:
      LOCATION_ADDR: ":8080"
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGBOUNCER_HOST: ${PGBOUNCER_HOST}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:              # миграции идут напрямую к postgres:5432
        condition: service_healthy
      pgbouncer:             # рантайм-пул — через pgbouncer:6432
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "/location", "-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- Catalog: дерево категорий (CRUD, кеш Redis, события) ----------
  catalog:
    build:
      context: ../..
      dockerfile: services/catalog/Dockerfile
    environment:
      CATALOG_ADDR: ":8080"
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGBOUNCER_HOST: ${PGBOUNCER_HOST}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:                 # кеш дерева категорий
        condition: service_healthy
      nats:                  # publish bozor.category.* из outbox
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "/catalog", "-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  media:
    build:
      context: ../..
      dockerfile: services/media/Dockerfile
    environment:
      MEDIA_ADDR: ":8080"
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGBOUNCER_HOST: ${PGBOUNCER_HOST}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MEDIA_BUCKET: ${MEDIA_BUCKET}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL}
      MEDIA_ORPHAN_TTL: ${MEDIA_ORPHAN_TTL:-24h}          # возраст непривязанного медиа до очистки
      MEDIA_CLEAN_INTERVAL: ${MEDIA_CLEAN_INTERVAL:-15m}  # период запуска очистки сирот
      MEDIA_PRESIGN_TTL: ${MEDIA_PRESIGN_TTL:-15m}        # срок жизни presigned-ссылки владельцу
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      minio:                 # хранилище оригиналов
        condition: service_healthy
      nats:                  # publish bozor.media.* из outbox
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "/media", "-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]

  # ---------- nginx: edge (TLS, LB) перед API Gateway ----------
  nginx:
    image: nginx:1.29-alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - pgbouncer
      - redis
      - nats
      - typesense
      - minio
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [bozor]
