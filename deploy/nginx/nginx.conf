# Bozor edge: балансировщик перед API Gateway.
# Апстрим gateway:8080 (Stage 0.4). Если gateway недоступен — @gateway_unavailable → 503 (RFC 7807).

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # DNS Docker: резолвим upstream в рантайме, чтобы nginx стартовал
    # даже когда контейнер gateway ещё не существует.
    resolver 127.0.0.11 valid=10s ipv6=off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    log_format json_combined escape=json
      '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
      '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
      '"request_time":$request_time,"request_id":"$request_id","upstream":"$upstream_addr"}';
    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        # Служебный health nginx (не путать с health сервисов)
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Весь публичный API — через gateway
        location /api/ {
            set $gateway http://gateway:8080;
            proxy_pass $gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            error_page 502 503 504 = @gateway_unavailable;
        }

        # WebSocket чата (Stage 7.2)
        location /ws {
            set $chat http://chat:8080;
            proxy_pass $chat;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 300s;
            error_page 502 503 504 = @gateway_unavailable;
        }

        location @gateway_unavailable {
            default_type application/problem+json;
            return 503 '{"type":"about:blank","title":"Service Unavailable","status":503,"detail":"Сервис временно недоступен"}';
        }

        location / {
            default_type application/problem+json;
            return 404 '{"type":"about:blank","title":"Not Found","status":404}';
        }
    }
}
